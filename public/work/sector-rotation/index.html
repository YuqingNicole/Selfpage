<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股板块轮动看板</title>
<style>
  :root{
    --bg:#f5f3f0; --card:#ffffff; --border:#f0ebe6;
    --text:#2c1a0e; --sub:#888888; --faint:#aaaaaa;
    --up:#d32f2f; --down:#2e7d32; --accent:#8B3A2A; --gold:#C5963A;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased}
  body{
    background:var(--bg); color:var(--text);
    font:13px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;
    font-variant-numeric:tabular-nums;
  }

  /* ===== 吸顶头部 (赭石色) ===== */
  .page-header{
    position:sticky; top:0; z-index:100;
    background:var(--accent); color:#fff;
    padding:13px 0 12px;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
  }
  .hwrap{max-width:1400px;margin:0 auto;padding:0 24px;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  h1{font-size:17px;font-weight:700;letter-spacing:.5px}
  .sub{color:rgba(255,255,255,.75);font-size:12px;margin-top:2px}
  .spybox{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.85)}
  .spybox b{color:#fff;font-size:17px;font-weight:700}
  .chip{padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;background:#fff}
  .chip.up{color:var(--up)}
  .chip.down{color:var(--down)}

  .wrap{max-width:1400px;margin:0 auto;padding:18px 24px 18px}

  /* ===== KPI ===== */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
  .kpi{background:var(--card);border-radius:12px;padding:14px 16px;
    box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .kpi .lab{color:var(--sub);font-size:12px;display:flex;justify-content:space-between}
  .kpi .val{font-size:24px;font-weight:700;margin:5px 0 2px;color:var(--text)}
  .kpi .note{color:var(--faint);font-size:11.5px}
  .pos{color:var(--up)} .neg{color:var(--down)}

  /* ===== 板块 pill 条 (点击打开详情) ===== */
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .pill{background:var(--card);border:1px solid transparent;border-radius:20px;
    padding:7px 14px;display:flex;align-items:center;gap:8px;
    box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:.15s}
  .pill:hover{border-color:var(--accent);transform:translateY(-1px)}
  .pill .pn{font-size:12.5px;font-weight:600;color:var(--accent)}
  .pill .pt{color:var(--faint);font-size:11px}
  .pill .pc{font-size:12px;font-weight:700}

  /* ===== 卡片网格 ===== */
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
  .card{background:var(--card);border-radius:12px;padding:14px 16px 10px;min-width:0;
    box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .span7{grid-column:span 7}.span5{grid-column:span 5}
  .card h2{font-size:14px;font-weight:700;display:inline;color:var(--accent)}
  .card .hint{color:var(--faint);font-size:11.5px;margin-left:8px}
  .chead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .chart{width:100%}
  #cHeat{height:452px} #cRRG{height:452px} #cEx{height:420px} #cBar{height:420px}

  /* 周期切换 */
  .tabs{display:flex;gap:4px}
  .tabs button{
    background:transparent;border:1px solid #e8ded6;color:var(--sub);
    border-radius:20px;padding:3px 12px;font-size:11.5px;cursor:pointer;font-family:inherit;
  }
  .tabs button.on{background:#faf0e8;border-color:var(--accent);color:var(--accent);font-weight:600}

  footer{color:var(--faint);font-size:11.5px;margin-top:16px;line-height:1.8;
    border-top:1px solid var(--border);padding-top:12px}
  footer code{background:#faf0e8;border-radius:5px;padding:1px 7px;color:var(--accent);font-size:11px}

  /* ===== 弹层 (板块详情 / 个股详情共用) ===== */
  .overlay{position:fixed;inset:0;background:rgba(44,26,14,.45);z-index:900;
    opacity:0;visibility:hidden;transition:opacity .25s}
  .overlay.open{opacity:1;visibility:visible}
  .modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-48%);
    width:min(780px,calc(100% - 28px));max-height:86vh;overflow-y:auto;
    background:#faf7f4;border-radius:14px;z-index:901;
    box-shadow:0 12px 40px rgba(0,0,0,.25);
    opacity:0;visibility:hidden;transition:.25s}
  .modal.open{opacity:1;visibility:visible;transform:translate(-50%,-50%)}
  .modal::-webkit-scrollbar{width:4px}
  .modal::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
  .smodal{z-index:902;width:min(720px,calc(100% - 28px))}
  .m-head{position:sticky;top:0;z-index:2;background:var(--accent);color:#fff;
    padding:13px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .m-title{font-size:17px;font-weight:700}
  .m-ticker{font-size:12px;opacity:.75}
  .m-badge{font-size:10.5px;font-weight:600;background:rgba(255,255,255,.18);
    padding:2px 8px;border-radius:8px}
  .m-spacer{flex:1}
  .m-price{font-size:18px;font-weight:700}
  .m-close{border:none;background:rgba(255,255,255,.15);color:#fff;font-size:15px;
    width:28px;height:28px;border-radius:50%;cursor:pointer;line-height:1}
  .m-close:hover{background:rgba(255,255,255,.3)}
  .m-body{padding:14px 18px 18px}
  .sec-t{font-size:12px;font-weight:700;color:var(--accent);margin:14px 0 6px;
    border-left:3px solid var(--gold);padding-left:8px}
  .sec-t:first-child{margin-top:0}

  .dtable{width:100%;border-collapse:collapse;font-size:12.5px;background:#fff;
    border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .dtable th{font-size:11px;color:var(--faint);font-weight:600;text-align:right;
    padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
  .dtable th:first-child,.dtable td:first-child{text-align:left}
  .dtable td{padding:7px 10px;border-bottom:1px solid #f6f1ec;text-align:right;white-space:nowrap}
  .dtable tr:last-child td{border-bottom:none}
  .dtable .tname{font-weight:600;color:var(--text)}
  .dtable .tcode{color:var(--faint);font-size:11px;margin-left:6px}
  .dtable .rlab{color:var(--sub);font-size:11.5px;font-weight:600}
  .dtable tr.clk{cursor:pointer}
  .dtable tr.clk:hover td{background:#faf0e8}
  #mChart,#sChart{height:230px;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}

  /* 指标格子 (基本面 / 技术面) */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .stat{background:#fff;border-radius:10px;padding:9px 10px;min-width:0;
    box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .stat.wide{grid-column:span 2}
  .stat .sl{font-size:10.5px;color:var(--faint);white-space:nowrap}
  .stat .sv{font-size:14px;font-weight:700;margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nod{color:var(--faint);font-size:12px;padding:4px 0}

  @media(max-width:1080px){
    .span7,.span5{grid-column:span 12}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .stats{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>
<header class="page-header">
  <div class="hwrap">
    <div>
      <h1>美股板块轮动看板</h1>
      <div class="sub" id="asof"></div>
    </div>
    <div class="spybox" id="spybox"></div>
  </div>
</header>

<div class="wrap">
  <div class="kpis" id="kpis"></div>
  <div class="pills" id="pills"></div>

  <div class="grid">
    <div class="card span7">
      <div class="chead">
        <div><h2>板块收益热力图</h2><span class="hint">单位 %，每列独立色阶，红涨绿跌 · 点击板块查看个股与ETF</span></div>
      </div>
      <div id="cHeat" class="chart"></div>
    </div>
    <div class="card span5">
      <div class="chead">
        <div><h2>相对强弱轮转 (RRG)</h2><span class="hint">周频 · 近12周轨迹 · 顺时针轮动</span></div>
      </div>
      <div id="cRRG" class="chart"></div>
    </div>
    <div class="card span7">
      <div class="chead">
        <div><h2>相对标普500超额收益</h2><span class="hint">近一年 · 起点归零 · 单位 %</span></div>
      </div>
      <div id="cEx" class="chart"></div>
    </div>
    <div class="card span5">
      <div class="chead">
        <div><h2>分周期板块收益</h2><span class="hint">虚线为 SPY · 点击板块查看详情</span></div>
        <div class="tabs" id="barTabs"></div>
      </div>
      <div id="cBar" class="chart"></div>
    </div>
  </div>

  <footer id="foot"></footer>
</div>

<!-- 板块详情弹层 -->
<div class="overlay" id="ovl"></div>
<div class="modal" id="modal">
  <div class="m-head" id="mHead"></div>
  <div class="m-body">
    <div class="sec-t">分周期收益 vs 标普500</div>
    <div id="mRets"></div>
    <div class="sec-t">近一年价格走势</div>
    <div id="mChart"></div>
    <div class="sec-t">相关 ETF <span style="color:var(--faint);font-weight:400">· 点击查看详情</span></div>
    <div id="mEtfs"></div>
    <div class="sec-t">代表个股 <span style="color:var(--faint);font-weight:400">· 点击查看详情</span></div>
    <div id="mStocks"></div>
  </div>
</div>

<!-- 个股 / ETF 详情弹层 -->
<div class="modal smodal" id="smodal">
  <div class="m-head" id="sHead"></div>
  <div class="m-body">
    <div class="sec-t">近期表现</div>
    <div id="sRets"></div>
    <div class="sec-t">近一年价格走势</div>
    <div id="sChart"></div>
    <div class="sec-t">基本面与估值</div>
    <div id="sFund"></div>
    <div class="sec-t">技术面</div>
    <div id="sTech"></div>
  </div>
</div>

<script src="vendor/echarts.min.js"></script>
<script src="data.js"></script>
<script>
const D = window.SECTOR_DATA;
const UP='#d32f2f', DOWN='#2e7d32', ACCENT='#8B3A2A';
const COLOR = {XLK:'#3d6fb4',XLC:'#7d5fd4',XLY:'#d97b2b',XLF:'#2b8a9e',XLI:'#8a7f76',
               XLB:'#b08a3e',XLE:'#c0392b',XLV:'#c2185b',XLP:'#2e7d5b',XLU:'#558b2f',XLRE:'#8d6e63'};
const AXIS = {axisLine:{lineStyle:{color:'#e3d9d0'}}, axisLabel:{color:'#999',fontSize:11},
              splitLine:{lineStyle:{color:'rgba(0,0,0,.05)'}},
              axisTick:{show:false}};
const TIP = {backgroundColor:'#ffffff',borderColor:'#e8ded6',textStyle:{color:'#2c1a0e',fontSize:12},
             extraCssText:'box-shadow:0 4px 14px rgba(0,0,0,.12);border-radius:8px;'};
const fmt = v => v==null?'—':(v>0?'+':'')+v.toFixed(2)+'%';
const cls = v => v==null?'':(v>=0?'pos':'neg');
/* 金额(美元): >=1e12 万亿, >=1e8 亿, 否则 M */
const fMoney = v => v==null?'—':(v>=1e12?(v/1e12).toFixed(2)+'万亿':v>=1e8?(v/1e8).toFixed(0)+'亿':(v/1e6).toFixed(0)+'M');
/* 成交量(股) */
const fVol = v => v==null?'—':(v>=1e8?(v/1e8).toFixed(2)+'亿股':v>=1e4?Math.round(v/1e4)+'万股':String(v));
const charts = [];
function mk(id){const c=echarts.init(document.getElementById(id));charts.push(c);return c;}
window.addEventListener('resize',()=>{charts.forEach(c=>c.resize()); if(mChart)mChart.resize(); if(sChart)sChart.resize();});

/* ---------- 头部 & KPI ---------- */
document.getElementById('asof').textContent =
  `11 个 GICS 板块 ETF (SPDR) · 数据截至 ${D.asof} · 红涨绿跌`;
document.getElementById('spybox').innerHTML =
  `<span>标普500 (SPY)</span><b>${D.spy.price.toFixed(2)}</b>
   <span class="chip ${D.spy.day_chg>=0?'up':'down'}">${fmt(D.spy.day_chg)}</span>`;

const K = D.kpi;
document.getElementById('kpis').innerHTML = [
  {lab:'近1月领涨', val:`${K.best.name}`, vcls:'pos', suf:fmt(K.best.ret),
   note:`${K.best.ticker} · 近1月收益`},
  {lab:'近1月领跌', val:`${K.worst.name}`, vcls:'neg', suf:fmt(K.worst.ret),
   note:`${K.worst.ticker} · 近1月收益`},
  {lab:'风险偏好', val:(K.risk_spread>=0?'偏进攻':'偏防御'),
   vcls:K.risk_spread>=0?'pos':'neg', suf:fmt(K.risk_spread),
   note:'近1月顺周期 − 防御板块收益差'},
  {lab:'轮动强度 (离散度)', val:K.dispersion.toFixed(2)+'%', vcls:'', suf:'',
   note:`跑赢大盘的板块 ${K.beat_spy}/${K.total} (近1月)`},
].map(k=>`<div class="kpi">
    <div class="lab"><span>${k.lab}</span><span class="${k.vcls}">${k.suf||''}</span></div>
    <div class="val ${k.vcls}">${k.val}</div>
    <div class="note">${k.note}</div></div>`).join('');

/* ---------- 板块 pill 条 ---------- */
document.getElementById('pills').innerHTML = D.sectors.map(s=>
  `<div class="pill" data-tk="${s.ticker}">
     <span class="pn">${s.name}</span><span class="pt">${s.ticker}</span>
     <span class="pc ${cls(s.day_chg)}">${fmt(s.day_chg)}</span>
   </div>`).join('');
document.querySelectorAll('.pill').forEach(p=>p.onclick=()=>openSector(p.dataset.tk));

/* ---------- 热力图 (每列独立归一) ---------- */
(function(){
  const H = D.horizons;
  const rows = [...D.sectors].sort((a,b)=>(b.returns['1月']??-999)-(a.returns['1月']??-999));
  const maxAbs = H.map(h=>Math.max(0.01,...rows.map(s=>Math.abs(s.returns[h]??0))));
  const mix=(a,b,t)=>a.map((x,i)=>Math.round(x+(b[i]-x)*t));
  function cellColor(v,ma){
    const t=Math.max(-1,Math.min(1,v/ma)), a=Math.pow(Math.abs(t),0.7);
    return mix([247,244,241], t>=0?[211,47,47]:[46,125,50], a);
  }
  const data=[];
  rows.forEach((s,y)=>H.forEach((h,x)=>{
    const v=s.returns[h];
    if(v==null) return;
    const norm=Math.abs(v/maxAbs[x]);
    data.push({value:[x,y,v], real:v,
      itemStyle:{color:`rgb(${cellColor(v,maxAbs[x]).join(',')})`,borderRadius:4},
      label:{color:norm>0.45?'rgba(255,255,255,.95)':'#6b5d52'}});
  }));
  const chart = mk('cHeat');
  chart.setOption({
    tooltip:{...TIP,formatter:p=>`${rows[p.value[1]].name} (${rows[p.value[1]].ticker})<br/>${H[p.value[0]]}: <b>${fmt(p.data.real)}</b>`},
    grid:{left:96,right:14,top:30,bottom:30},
    xAxis:{type:'category',data:H,position:'top',...AXIS,splitLine:{show:false},axisLine:{show:false},
           axisLabel:{color:'#999',fontSize:12}},
    yAxis:{type:'category',inverse:true,...AXIS,splitLine:{show:false},axisLine:{show:false},
           data:rows.map(s=>`${s.name} ${s.ticker}`),axisLabel:{color:'#5a4a3f',fontSize:12}},
    series:[{type:'heatmap',data,cursor:'pointer',label:{show:true,fontSize:11.5,
             formatter:p=>p.data.real.toFixed(1)},
             itemStyle:{borderColor:'#f5f3f0',borderWidth:3},
             emphasis:{itemStyle:{shadowBlur:8,shadowColor:'rgba(0,0,0,.25)'}}}]
  });
  chart.on('click', p=>{ if(p.seriesType==='heatmap') openSector(rows[p.value[1]].ticker); });
})();

/* ---------- RRG ---------- */
(function(){
  const pts=Object.values(D.rrg).flat().map(p=>[p[0],p[1]]);
  const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
  const r05=v=>Math.round(v*2)/2;
  const pad=(a,b)=>{const r=b-a||1;return[r05(a-r*.12-.1),r05(b+r*.12+.1)]};
  let [x0,x1]=pad(Math.min(...xs,100),Math.max(...xs,100));
  let [y0,y1]=pad(Math.min(...ys,100),Math.max(...ys,100));
  const qLab=(x,y,t,c)=>({value:[x,y],
    label:{show:true,position:'inside',formatter:t,color:c,fontSize:12,fontWeight:600}});
  const series=[{
    type:'scatter', data:[], silent:true, symbolSize:0,  // 仅承载象限
    markLine:{silent:true,symbol:'none',label:{show:false},
      lineStyle:{color:'#d8cdc3',type:'dashed',width:1},
      data:[{xAxis:100},{yAxis:100}]},
    markArea:{silent:true,data:[
      [{coord:[100,100],itemStyle:{color:'rgba(139,58,42,.05)'}},{coord:[x1,y1]}],
      [{coord:[x0,100],itemStyle:{color:'rgba(46,125,50,.05)'}},{coord:[100,y1]}],
      [{coord:[x0,y0],itemStyle:{color:'rgba(0,0,0,.02)'}},{coord:[100,100]}],
      [{coord:[100,y0],itemStyle:{color:'rgba(211,47,47,.05)'}},{coord:[x1,100]}],
    ]}
  },{ // 象限角标
    type:'scatter', silent:true, symbolSize:0, z:1,
    data:[qLab(x1-.045*(x1-x0), y1-.06*(y1-y0), '领先', 'rgba(139,58,42,.7)'),
          qLab(x0+.045*(x1-x0), y1-.06*(y1-y0), '改善', 'rgba(46,125,50,.7)'),
          qLab(x0+.045*(x1-x0), y0+.06*(y1-y0), '落后', 'rgba(140,130,120,.8)'),
          qLab(x1-.045*(x1-x0), y0+.06*(y1-y0), '转弱', 'rgba(211,47,47,.65)')]
  }];
  const heads=[];
  Object.entries(D.rrg).forEach(([tk,trail])=>{
    series.push({type:'line',silent:true,data:trail.map(p=>[p[0],p[1]]),
      lineStyle:{color:COLOR[tk],width:1.3,opacity:.45},symbol:'none',z:2});
    const h=trail[trail.length-1];
    heads.push({name:tk,value:[h[0],h[1]],date:h[2],
      itemStyle:{color:COLOR[tk],borderColor:'#fff',borderWidth:1.5}});
  });
  series.push({type:'scatter',data:heads,symbolSize:11,z:3,cursor:'pointer',
    label:{show:true,position:'right',fontSize:10.5,color:'#5a4a3f',
           formatter:p=>D.sectors.find(s=>s.ticker===p.name)?.name||p.name},
    labelLayout:{hideOverlap:true}});
  const quadName=(x,y)=>x>=100?(y>=100?'领先':'转弱'):(y>=100?'改善':'落后');
  const chart = mk('cRRG');
  chart.setOption({
    tooltip:{...TIP,trigger:'item',formatter:p=>{
      if(!p.name)return'';
      const s=D.sectors.find(x=>x.ticker===p.name);
      return `${s.name} (${p.name}) · ${p.data.date}<br/>RS-Ratio: <b>${p.value[0]}</b> · RS-Momentum: <b>${p.value[1]}</b><br/>象限: ${quadName(p.value[0],p.value[1])}`;}},
    grid:{left:52,right:26,top:16,bottom:40},
    xAxis:{name:'RS-Ratio →',nameLocation:'middle',nameGap:26,
      nameTextStyle:{color:'#aaa',fontSize:11},min:x0,max:x1,...AXIS,
      axisLabel:{...AXIS.axisLabel,formatter:v=>v.toFixed(1)}},
    yAxis:{name:'RS-Momentum →',nameTextStyle:{color:'#aaa',fontSize:11},
      min:y0,max:y1,...AXIS,axisLabel:{...AXIS.axisLabel,formatter:v=>v.toFixed(1)}},
    series
  });
  chart.on('click', p=>{ if(p.seriesType==='scatter' && p.name) openSector(p.name); });
})();

/* ---------- 超额收益曲线 ---------- */
(function(){
  const series=Object.entries(D.excess.series).map(([tk,vals])=>({
    name:tk,type:'line',data:vals,showSymbol:false,smooth:false,
    lineStyle:{width:1.6,color:COLOR[tk]},itemStyle:{color:COLOR[tk]},
    emphasis:{focus:'series',lineStyle:{width:3}},
  }));
  series.push({name:'SPY累计',type:'line',data:D.excess.spy_cum,showSymbol:false,
    lineStyle:{width:1.4,color:'#9a8f85',type:'dashed'},itemStyle:{color:'#9a8f85'},z:1});
  mk('cEx').setOption({
    tooltip:{...TIP,trigger:'axis',axisPointer:{type:'line',lineStyle:{color:'#d8cdc3'}},
      valueFormatter:v=>v==null?'—':(v>0?'+':'')+v.toFixed(2)+'%'},
    legend:{type:'scroll',top:0,icon:'roundRect',itemWidth:12,itemHeight:3,
      textStyle:{color:'#888',fontSize:11},inactiveColor:'#c9bfb6',
      pageTextStyle:{color:'#888'}},
    grid:{left:52,right:16,top:40,bottom:32},
    xAxis:{type:'category',data:D.excess.dates,boundaryGap:false,...AXIS,
      splitLine:{show:false}},
    yAxis:{type:'value',...AXIS,axisLabel:{...AXIS.axisLabel,formatter:'{value}%'}},
    series:[...series.slice(0,-1),{...series[series.length-1],
      markLine:{silent:true,symbol:'none',label:{show:false},
        lineStyle:{color:'#d8cdc3',width:1},data:[{yAxis:0}]}}]
  });
})();

/* ---------- 分周期条形图 ---------- */
(function(){
  const chart=mk('cBar'), tabs=document.getElementById('barTabs');
  function render(h){
    const rows=[...D.sectors].filter(s=>s.returns[h]!=null)
      .sort((a,b)=>a.returns[h]-b.returns[h]);   // 升序 → 最大值在顶部
    chart.setOption({
      tooltip:{...TIP,trigger:'item',formatter:p=>`${p.name}<br/>${h}: <b>${fmt(p.value)}</b>`},
      grid:{left:96,right:44,top:14,bottom:28},
      xAxis:{type:'value',
        min:Math.floor(Math.min(...rows.map(s=>s.returns[h]),D.spy.returns[h])-1),
        max:Math.ceil(Math.max(...rows.map(s=>s.returns[h]),D.spy.returns[h])+1),
        ...AXIS,axisLabel:{...AXIS.axisLabel,formatter:'{value}%'}},
      yAxis:{type:'category',data:rows.map(s=>`${s.name} ${s.ticker}`),
        ...AXIS,splitLine:{show:false},axisLine:{show:false},
        axisLabel:{color:'#5a4a3f',fontSize:11.5}},
      series:[{type:'bar',barWidth:13,cursor:'pointer',
        data:rows.map(s=>({value:s.returns[h],
          itemStyle:{color:s.returns[h]>=0?UP:DOWN,
            borderRadius:s.returns[h]>=0?[0,4,4,0]:[4,0,0,4]},
          label:{position:s.returns[h]>=0?'right':'left'}})),
        label:{show:true,fontSize:10.5,color:'#999',
          formatter:p=>fmt(p.value)},
        markLine:{silent:true,symbol:'none',
          lineStyle:{color:ACCENT,type:'dashed',width:1.2},
          label:{color:ACCENT,fontSize:10.5,formatter:'SPY '+fmt(D.spy.returns[h]),position:'end'},
          data:[{xAxis:D.spy.returns[h]}]}
      }]
    },true);
  }
  chart.on('click', p=>{
    if(p.seriesType!=='bar') return;
    const tk = (p.name||'').split(' ').pop();
    if(D.sectors.some(s=>s.ticker===tk)) openSector(tk);
  });
  D.horizons.forEach((h,i)=>{
    const b=document.createElement('button');
    b.textContent=h; if(i===1)b.className='on';
    b.onclick=(e)=>{e.stopPropagation();tabs.querySelectorAll('button').forEach(x=>x.className='');b.className='on';render(h);};
    tabs.appendChild(b);
  });
  render('1月');
})();

/* ---------- 板块详情弹层 ---------- */
const ovl=document.getElementById('ovl'), modal=document.getElementById('modal'),
      smodal=document.getElementById('smodal');
let mChart=null, sChart=null;

/* 全部标的索引: ticker -> {行情..., kind, sec} */
const QMAP={};
Object.entries(D.stocks).forEach(([sec,list])=>list.forEach(q=>QMAP[q.t]={...q,kind:'个股',sec}));
Object.entries(D.etfs).forEach(([sec,list])=>list.forEach(q=>QMAP[q.t]={...q,kind:'ETF',sec}));

function qRow(q){
  return `<tr class="clk" data-t="${q.t}">
    <td><span class="tname">${q.n}</span><span class="tcode">${q.t}</span></td>
    <td>${q.p==null?'—':q.p.toFixed(2)}</td>
    <td class="${cls(q.chg)}">${fmt(q.chg)}</td>
    <td class="${cls(q.m1)}">${fmt(q.m1)}</td>
    <td style="color:var(--sub)">${q.vr==null?'—':q.vr.toFixed(2)+'x'}</td>
  </tr>`;
}
function qTable(list){
  if(!list||!list.length) return '<div class="nod">暂无数据</div>';
  return `<table class="dtable"><tr><th>名称</th><th>最新</th><th>今日</th><th>近1月</th><th>量比</th></tr>
    ${list.map(qRow).join('')}</table>`;
}

function openSector(tk){
  const s=D.sectors.find(x=>x.ticker===tk);
  if(!s) return;
  const grp=s.group==='cyc'?'顺周期':'防御';
  document.getElementById('mHead').innerHTML=
    `<span class="m-title">${s.name}</span><span class="m-ticker">${tk}</span>
     <span class="m-badge">${grp}</span><span class="m-spacer"></span>
     <span class="m-price">${s.price.toFixed(2)}</span>
     <span class="chip ${s.day_chg>=0?'up':'down'}">${fmt(s.day_chg)}</span>
     <button class="m-close" onclick="closeModal()">✕</button>`;

  // 分周期收益表: 板块 / SPY / 超额
  const cols=['今日',...D.horizons];
  const sec=[s.day_chg,...D.horizons.map(h=>s.returns[h])];
  const spy=[D.spy.day_chg,...D.horizons.map(h=>D.spy.returns[h])];
  const ex=sec.map((v,i)=>(v==null||spy[i]==null)?null:v-spy[i]);
  const rrow=(lab,arr,bold)=>`<tr><td class="rlab">${lab}</td>${arr.map(v=>
    `<td class="${cls(v)}" ${bold?'style="font-weight:700"':''}>${fmt(v)}</td>`).join('')}</tr>`;
  document.getElementById('mRets').innerHTML=
    `<table class="dtable"><tr><th></th>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>
     ${rrow(s.name,sec,true)}${rrow('标普500',spy)}${rrow('超额',ex)}</table>`;

  document.getElementById('mEtfs').innerHTML=qTable(D.etfs[tk]);
  document.getElementById('mStocks').innerHTML=qTable(D.stocks[tk]);
  modal.querySelectorAll('tr.clk').forEach(r=>r.onclick=()=>openQuote(r.dataset.t));

  ovl.classList.add('open'); modal.classList.add('open');
  document.body.style.overflow='hidden';

  requestAnimationFrame(()=>{
    const el=document.getElementById('mChart');
    if(!mChart) mChart=echarts.init(el);
    const hex=COLOR[tk];
    mChart.setOption({
      tooltip:{...TIP,trigger:'axis',axisPointer:{type:'line',lineStyle:{color:'#d8cdc3'}},
        valueFormatter:v=>v==null?'—':'$'+v.toFixed(2)},
      grid:{left:56,right:16,top:16,bottom:26},
      xAxis:{type:'category',data:D.excess.dates,boundaryGap:false,...AXIS,splitLine:{show:false}},
      yAxis:{type:'value',scale:true,...AXIS},
      series:[{type:'line',data:D.px[tk],showSymbol:false,cursor:'default',
        lineStyle:{width:1.8,color:hex},itemStyle:{color:hex},
        areaStyle:{color:hex,opacity:.08}}]
    },true);
    mChart.resize();
  });
}
function closeModal(){
  closeQuote();
  ovl.classList.remove('open'); modal.classList.remove('open');
  document.body.style.overflow='';
}
ovl.onclick=closeModal;

/* ---------- 个股 / ETF 详情弹层 ---------- */
/* 指标格子: items = [[label, valueHtml, wide?]] */
function stats(items){
  const cells=items.filter(x=>x[1]!=null);
  if(!cells.length) return '<div class="nod">暂无数据</div>';
  return `<div class="stats">${cells.map(([l,v,w])=>
    `<div class="stat${w?' wide':''}"><div class="sl">${l}</div><div class="sv">${v}</div></div>`).join('')}</div>`;
}

function openQuote(t){
  const q=QMAP[t];
  if(!q) return;
  const secName=D.sectors.find(s=>s.ticker===q.sec)?.name||'';
  document.getElementById('sHead').innerHTML=
    `<span class="m-title">${q.n}</span><span class="m-ticker">${q.t}</span>
     <span class="m-badge">${q.kind}</span><span class="m-badge">${secName}</span>
     <span class="m-spacer"></span>
     <span class="m-price">${q.p==null?'—':q.p.toFixed(2)}</span>
     <span class="chip ${cls(q.chg)==='pos'?'up':'down'}">${fmt(q.chg)}</span>
     <button class="m-close" onclick="closeQuote()">✕</button>`;

  // 近期表现: 7 个周期 + 量比
  const rets=[['今日',q.chg],['1周',q.w1],['1月',q.m1],['3月',q.m3],['6月',q.m6],['YTD',q.ytd],['1年',q.y1]];
  document.getElementById('sRets').innerHTML=
    `<table class="dtable"><tr><th></th>${rets.map(c=>`<th>${c[0]}</th>`).join('')}<th>量比</th></tr>
     <tr><td class="rlab">${q.n}</td>${rets.map(([,v])=>
       `<td class="${cls(v)}" style="font-weight:600">${fmt(v)}</td>`).join('')}
       <td style="color:var(--sub)">${q.vr==null?'—':q.vr.toFixed(2)+'x'}</td></tr></table>`;

  // 基本面与估值
  const small=v=>`<span style="font-size:12px;font-weight:600">${v}</span>`;
  const fund=[
    ['公司', q.full&&small(q.full), 1],
    ['行业', q.ind&&small(q.ind), 1],
    ['市值', q.mc&&('$'+fMoney(q.mc))],
    ['规模 (AUM)', q.aum&&('$'+fMoney(q.aum))],
    ['PE (TTM)', q.pe&&q.pe.toFixed(1)],
    ['预期 PE', q.fpe&&q.fpe.toFixed(1)],
    ['PB', q.pb&&q.pb.toFixed(1)],
    ['股息率', q.dy!=null?q.dy.toFixed(2)+'%':null],
    ['Beta', q.beta&&q.beta.toFixed(2)],
    ['EPS (TTM)', q.eps&&('$'+q.eps.toFixed(2))],
    ['净利率', q.pm!=null?q.pm.toFixed(1)+'%':null],
    ['ROE', q.roe!=null?q.roe.toFixed(1)+'%':null],
    ['分析师目标价', q.tgt&&('$'+q.tgt.toFixed(0))],
  ];
  document.getElementById('sFund').innerHTML=stats(fund);

  // 技术面
  const maCell=v=>v==null?null:`<span class="${q.p>=v?'pos':'neg'}">$${v.toFixed(2)} ${q.p>=v?'↑':'↓'}</span>`;
  const tech=[
    ['52周最高', q.h52&&('$'+q.h52.toFixed(2))],
    ['52周最低', q.l52&&('$'+q.l52.toFixed(2))],
    ['距52周高点', (q.h52&&q.p)?`<span class="neg">${((q.p/q.h52-1)*100).toFixed(1)}%</span>`:null],
    ['MA20', maCell(q.ma20)],
    ['MA50', maCell(q.ma50)],
    ['MA200', maCell(q.ma200)],
    ['年化波动率', q.vola!=null?q.vola.toFixed(1)+'%':null],
    ['成交额', q.tvr&&('$'+fMoney(q.tvr))],
    ['成交量', q.vol&&fVol(q.vol)],
  ];
  document.getElementById('sTech').innerHTML=stats(tech);

  smodal.classList.add('open');
  requestAnimationFrame(()=>{
    const el=document.getElementById('sChart');
    if(!sChart) sChart=echarts.init(el);
    sChart.setOption({
      tooltip:{...TIP,trigger:'axis',axisPointer:{type:'line',lineStyle:{color:'#d8cdc3'}},
        valueFormatter:v=>v==null?'—':'$'+v.toFixed(2)},
      grid:{left:56,right:16,top:16,bottom:26},
      xAxis:{type:'category',data:D.hist_dates,boundaryGap:false,...AXIS,splitLine:{show:false}},
      yAxis:{type:'value',scale:true,...AXIS},
      series:[{type:'line',data:q.hist,showSymbol:false,cursor:'default',
        lineStyle:{width:1.8,color:ACCENT},itemStyle:{color:ACCENT},
        areaStyle:{color:ACCENT,opacity:.08}}]
    },true);
    sChart.resize();
  });
}
function closeQuote(){
  smodal.classList.remove('open');
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Escape') return;
  if(smodal.classList.contains('open')) closeQuote();
  else closeModal();
});

   更新数据: <code>cd scripts/sector-rotation && .venv/bin/python fetch_data.py</code> 后刷新本页 · 页面生成于 ${D.generated}`;
