<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股板块轮动看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f7f8f4;
  --paper-deep:#e9ece4;
  --card:#fff;
  --ink:#080a0f;
  --ink-soft:#3d4652;
  --ink-mute:#7b8491;
  --line:#d9ded4;
  --line-dark:#080a0f;
  --accent:#3157ff;
  --accent-deep:#1536d1;
  --accent-soft:#88a0ff;
  --accent-2:#00a676;
  --warn:#e66b00;
  --accent-dim:#3157ff17;
  --up:#d32f2f;
  --down:#00a676;
  --hairline:#080a0f14;
  --grid-line:#080a0f1a;
  --font-display:"Bricolage Grotesque","Hanken Grotesk",-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  --font-text:"Hanken Grotesk",-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  --font-mono:"IBM Plex Mono",ui-monospace,"SFMono-Regular",Menlo,monospace;
  --text-2xs:.625rem;
  --text-xs:.6875rem;
  --text-sm:.78125rem;
  --text-base:.9375rem;
  --text-lg:1.1875rem;
  --text-xl:1.375rem;
  --text-2xl:1.875rem;
  --text-hero:clamp(2rem,3vw+1rem,3.5rem);
  --w-body:400;
  --w-semibold:600;
  --w-bold:700;
  --w-display:800;
  --lh-tight:1.15;
  --lh-snug:1.4;
  --lh-base:1.6;
  --track-label:.12em;
  --track-wide:.18em;
  --rule-heavy:3px solid var(--ink);
  --rule-bold:2px solid var(--ink);
  --rule-card:1.5px solid var(--ink);
  --duration:.18s;
  --ease:cubic-bezier(.22,1,.36,1);
  --page-pad:clamp(16px,3.2vw,48px);
  --page-max:1480px;
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{
  background:linear-gradient(90deg,#080a0f09 1px,transparent 1px),
             linear-gradient(0deg,#080a0f07 1px,transparent 1px),
             var(--paper);
  background-size:48px 48px;
  color:var(--ink-soft);
  font:var(--w-body) var(--text-base)/var(--lh-base) var(--font-text);
  font-variant-numeric:tabular-nums;
}
.page{max-width:var(--page-max);padding:0 var(--page-pad);margin:0 auto}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
h1,h2,h3{font-family:var(--font-display);color:var(--ink);font-weight:var(--w-bold);margin:0}
button{font-family:inherit;cursor:pointer}
button:focus-visible,a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.kicker{
  font-family:var(--font-mono);font-size:var(--text-xs);font-weight:var(--w-semibold);
  letter-spacing:var(--track-wide);text-transform:uppercase;color:var(--accent)
}
.pos{color:var(--up)} .neg{color:var(--down)}

/* ======= MASTHEAD ======= */
.masthead{padding-top:20px}
.masthead-top{
  border-bottom:1px solid var(--ink);
  display:flex;justify-content:space-between;align-items:center;
  gap:16px;padding-bottom:10px;
}
.masthead-site{font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--track-label);color:var(--ink-mute)}
.masthead-main{
  border-bottom:var(--rule-heavy);
  display:grid;grid-template-columns:minmax(0,1fr) minmax(260px,.36fr);gap:0
}
.masthead-word{padding:24px 28px 28px 0}
.masthead-title{
  font-family:var(--font-display);font-size:var(--text-hero);
  font-weight:var(--w-display);color:var(--ink);line-height:.94;letter-spacing:-.02em
}
.masthead-lede{
  max-width:46em;font-size:var(--text-base);line-height:var(--lh-base);
  color:var(--ink-soft);margin:14px 0 0
}
.masthead-meta{
  border-left:1px solid var(--ink);
  font-family:var(--font-mono);font-size:var(--text-sm);color:var(--ink-mute);
  text-align:right;display:flex;flex-direction:column;justify-content:flex-end;
  gap:4px;padding:24px 0 28px 24px
}
.masthead-meta .asof{color:var(--accent);font-weight:var(--w-semibold)}
.spy-block{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.spy-price{font-family:var(--font-display);font-size:var(--text-xl);color:var(--ink);font-weight:var(--w-display)}
.chip{
  font-family:var(--font-mono);font-size:var(--text-2xs);font-weight:var(--w-semibold);
  letter-spacing:var(--track-label);text-transform:uppercase;
  border:1.5px solid var(--ink);padding:2px 7px;display:inline-block
}
.chip.up{color:var(--up);border-color:var(--up)}
.chip.down{color:var(--down);border-color:var(--down)}

/* ======= KPI ROW ======= */
.kpi-row{
  border-bottom:var(--rule-bold);
  display:grid;grid-template-columns:repeat(4,1fr);
}
.kpi-cell{
  border-right:1px solid var(--line);padding:18px 20px 16px;
}
.kpi-cell:last-child{border-right:0}
.kpi-label{
  font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--track-label);
  text-transform:uppercase;color:var(--ink-mute);display:flex;justify-content:space-between;align-items:center
}
.kpi-label .suf{font-weight:var(--w-semibold)}
.kpi-value{
  font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--w-display);
  color:var(--ink);margin:6px 0 4px;line-height:1
}
.kpi-note{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--ink-mute);margin-top:4px}

/* ======= CONTROL BAR (pills) ======= */
.control-bar{
  border-bottom:1px solid var(--line);
  display:flex;flex-wrap:wrap;gap:6px;padding:14px 0
}
.pill{
  font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--track-label);
  text-transform:uppercase;
  border:1.5px solid var(--ink);background:var(--card);color:var(--ink-soft);
  padding:5px 12px;display:inline-flex;align-items:center;gap:8px;
  cursor:pointer;transition:background var(--duration) var(--ease),color var(--duration) var(--ease)
}
.pill:hover,.pill.on{background:var(--accent);border-color:var(--accent);color:var(--card)}
.pill .pn{font-weight:var(--w-semibold)}
.pill .pt{opacity:.6;font-size:var(--text-2xs)}
.pill .pc{font-weight:var(--w-semibold)}
.pill.on .pc,.pill.on .pt{color:var(--card)}
.pill .pc.pos{color:var(--up)} .pill .pc.neg{color:var(--down)}
.pill.on .pc{color:var(--card) !important}

/* ======= MAIN GRID ======= */
.main-grid{
  display:grid;grid-template-columns:repeat(12,1fr);gap:0;
  border-bottom:var(--rule-bold);margin-top:0
}
.chart-card{background:var(--card);border:var(--rule-card);min-width:0;overflow:hidden}
.span7{grid-column:span 7} .span5{grid-column:span 5}
.span12{grid-column:span 12}
.chart-card+.chart-card{margin-top:0}
/* border collapse between cards */
.main-grid .chart-card{margin:-0.75px}

.card-head{
  border-bottom:1px solid var(--line);padding:14px 16px 12px;
  display:flex;justify-content:space-between;align-items:flex-end;gap:12px
}
.card-head h2{
  font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--w-bold);
  color:var(--ink);letter-spacing:-.01em
}
.card-hint{
  font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--ink-mute);
  letter-spacing:var(--track-label);margin-top:4px
}
.chart-body{padding:0}
#cHeat{height:440px} #cRRG{height:440px} #cEx{height:400px} #cBar{height:400px}

/* ======= PERIOD TABS ======= */
.tabs{display:flex;gap:0}
.tabs button{
  font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--track-label);
  text-transform:uppercase;
  border:1.5px solid var(--ink);border-right:0;background:var(--card);color:var(--ink-mute);
  padding:4px 11px;
  transition:background var(--duration) var(--ease),color var(--duration) var(--ease)
}
.tabs button:last-child{border-right:1.5px solid var(--ink)}
.tabs button:hover{background:var(--accent-dim);color:var(--accent)}
.tabs button.on{background:var(--accent);border-color:var(--accent);color:var(--card);font-weight:var(--w-semibold)}

/* ======= FOOTER ======= */
footer{
  font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--ink-mute);
  letter-spacing:var(--track-label);line-height:2;
  padding:18px 0 32px;border-top:1px solid var(--line);margin-top:0
}
footer code{
  background:var(--card);border:1px solid var(--line);
  padding:1px 6px;font-size:var(--text-2xs)
}

/* ======= OVERLAY + MODAL ======= */
.overlay{
  position:fixed;inset:0;background:rgba(8,10,15,.55);z-index:900;
  opacity:0;visibility:hidden;
  transition:opacity .22s var(--ease),visibility .22s;
  backdrop-filter:blur(3px)
}
.overlay.open{opacity:1;visibility:visible}
.modal{
  position:fixed;left:50%;top:50%;
  transform:translate(-50%,-49%) scale(.98);
  width:min(800px,calc(100% - 24px));max-height:88vh;overflow-y:auto;
  background:var(--paper);border:var(--rule-card);z-index:901;
  box-shadow:6px 6px 0 var(--ink);
  opacity:0;visibility:hidden;
  transition:opacity .2s var(--ease),transform .2s var(--ease),visibility .2s
}
.modal.open{opacity:1;visibility:visible;transform:translate(-50%,-50%) scale(1)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--line);border-radius:0}

.m-head{
  position:sticky;top:0;z-index:2;
  background:var(--ink);color:var(--paper);
  padding:14px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap
}
.m-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--w-bold);color:var(--paper)}
.m-ticker{font-family:var(--font-mono);font-size:var(--text-xs);opacity:.6;letter-spacing:var(--track-label)}
.m-badge{
  font-family:var(--font-mono);font-size:var(--text-2xs);font-weight:var(--w-semibold);
  letter-spacing:var(--track-label);text-transform:uppercase;
  border:1px solid rgba(255,255,255,.25);padding:2px 8px
}
.m-spacer{flex:1}
.m-price{font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--w-display);color:var(--paper)}
.m-back,.m-close{
  border:1px solid rgba(255,255,255,.25);background:transparent;color:var(--paper);
  transition:background var(--duration) var(--ease)
}
.m-back{font-size:var(--text-xs);font-weight:var(--w-semibold);letter-spacing:var(--track-label);padding:4px 12px}
.m-close{font-size:14px;width:28px;height:28px;line-height:1;display:flex;align-items:center;justify-content:center}
.m-back:hover,.m-close:hover{background:rgba(255,255,255,.15)}
.m-body{padding:16px 18px 22px}
.sec-t{
  font-family:var(--font-mono);font-size:var(--text-xs);font-weight:var(--w-semibold);
  letter-spacing:var(--track-wide);text-transform:uppercase;color:var(--accent);
  border-top:var(--rule-bold);margin:18px 0 10px;padding-top:10px
}
.sec-t:first-child{border-top:0;margin-top:0;padding-top:0}

/* ======= TABLES ======= */
.dtable{width:100%;border-collapse:collapse;font-size:var(--text-sm);background:var(--card);border:var(--rule-card)}
.dtable th{
  font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--track-label);
  text-transform:uppercase;color:var(--ink-mute);font-weight:var(--w-semibold);
  text-align:right;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap
}
.dtable th:first-child,.dtable td:first-child{text-align:left}
.dtable td{padding:9px 10px;border-bottom:1px solid var(--hairline);text-align:right;white-space:nowrap}
.dtable tr:last-child td{border-bottom:0}
.dtable .tname{font-weight:var(--w-semibold);color:var(--ink)}
.dtable .tcode{font-family:var(--font-mono);color:var(--ink-mute);font-size:var(--text-2xs);margin-left:6px}
.dtable .rlab{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--ink-mute);font-weight:var(--w-semibold)}
.dtable tr.clk{cursor:pointer;transition:background var(--duration) var(--ease)}
.dtable tr.clk:hover td{background:var(--accent-dim)}
#mChart{height:220px;background:var(--card);border:var(--rule-card)}
.nod{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--ink-mute);padding:4px 0}
#mRets,#mEtfs,#mStocks{overflow-x:auto}

/* ======= RESPONSIVE ======= */
@media(max-width:1080px){
  .span7,.span5{grid-column:span 12}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .kpi-cell:nth-child(2){border-right:0}
  .kpi-cell:nth-child(3){border-top:1px solid var(--line)}
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat:nth-child(2n){border-right:0}
}
@media(max-width:640px){
  .modal{left:0;right:0;bottom:0;top:auto;transform:translateY(100%);
    width:100%;max-height:88vh;border-radius:0;box-shadow:none}
  .modal.open{transform:translateY(0)}
  .masthead-main{grid-template-columns:1fr}
  .masthead-meta{border-left:0;border-top:1px solid var(--ink);text-align:left;padding:12px 0 16px;align-items:flex-start}
  .spy-block{justify-content:flex-start}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
}
@media(prefers-reduced-motion:no-preference){
  .pill,.tabs button,.dtable tr.clk{transition:background var(--duration) var(--ease),color var(--duration) var(--ease),border-color var(--duration) var(--ease)}
}
</style>
</head>
<body>
<div class="page">
<div class="masthead">
  <div class="masthead-top">
    <span class="masthead-site kicker">美股 · 板块轮动看板</span>
    <div style="display:flex;align-items:center;gap:12px">
      <a href="/work/sector-rotation/screener"
         onclick="window.top.location.href='/work/sector-rotation/screener';return false;"
         style="font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--track-label);
                color:var(--ink-mute);text-decoration:none;
                border:1.5px solid var(--line);padding:3px 12px;
                transition:color .18s,border-color .18s">个股筛选 →</a>
      <span id="asof" style="font-family:var(--font-mono);font-size:var(--text-xs);color:var(--ink-mute)"></span>
    </div>
  </div>
  <div class="masthead-main">
    <div class="masthead-word">
      <h1 class="masthead-title">Sector Rotation<br>Dashboard</h1>
      <p class="masthead-lede">11 个 GICS 板块 ETF (SPDR) — 收益热力图、相对强弱轮转 (RRG)、超额收益曲线</p>
    </div>
    <div class="masthead-meta">
      <span class="asof" id="asofLabel"></span>
      <div class="spy-block" id="spybox"></div>
    </div>
  </div>
</div>

<!-- KPI row -->
<div class="kpi-row" id="kpis"></div>

<!-- Sector pills -->
<div class="control-bar" id="pills"></div>

<!-- Chart grid -->
<div class="main-grid">
  <div class="chart-card span7">
    <div class="card-head">
      <div>
        <h2>板块收益热力图</h2>
        <div class="card-hint">单位 %，每列独立色阶，红涨绿跌 · 点击板块查看个股与 ETF</div>
      </div>
    </div>
    <div id="cHeat"></div>
  </div>
  <div class="chart-card span5">
    <div class="card-head">
      <div>
        <h2>相对强弱轮转 RRG</h2>
        <div class="card-hint">周频 · 近12周轨迹 · 顺时针轮动</div>
      </div>
    </div>
    <div id="cRRG"></div>
  </div>
  <div class="chart-card span7">
    <div class="card-head">
      <div>
        <h2>相对标普500超额收益</h2>
        <div class="card-hint">近一年 · 起点归零 · 单位 %</div>
      </div>
    </div>
    <div id="cEx"></div>
  </div>
  <div class="chart-card span5">
    <div class="card-head">
      <div>
        <h2>分周期板块收益</h2>
        <div class="card-hint">虚线为 SPY · 点击板块查看详情</div>
      </div>
      <div class="tabs" id="barTabs"></div>
    </div>
    <div id="cBar"></div>
  </div>
</div>

<footer id="foot"></footer>
</div>

<!-- 板块详情弹层 -->
<div class="overlay" id="ovl"></div>
<div class="modal" id="modal">
  <div class="m-head" id="mHead"></div>
  <div class="m-body">
    <div class="sec-t">分周期收益 vs 标普500</div>
    <div id="mRets"></div>
    <div class="sec-t">近一年价格走势</div>
    <div id="mChart"></div>
    <div class="sec-t">相关 ETF <span style="font-family:var(--font-mono);font-weight:400;font-size:var(--text-2xs);color:var(--ink-mute)">· 点击查看详情</span></div>
    <div id="mEtfs"></div>
    <div class="sec-t">代表个股 <span style="font-family:var(--font-mono);font-weight:400;font-size:var(--text-2xs);color:var(--ink-mute)">· 点击查看详情</span></div>
    <div id="mStocks"></div>
  </div>
</div>


<script src="vendor/echarts.min.js"></script>
<script src="data.js"></script>
<script>
const D = window.SECTOR_DATA;

/* ---- design tokens mirrored for echarts ---- */
const INK   = '#080a0f';
const PAPER = '#f7f8f4';
const MUTE  = '#7b8491';
const LINE  = '#d9ded4';
const ACCENT= '#3157ff';
const UP    = '#d32f2f';
const DOWN  = '#00a676';

const COLOR = {
  XLK:'#3157ff', XLC:'#7c70ec', XLY:'#e66b00', XLF:'#00a676',
  XLI:'#7b8491', XLB:'#b08900', XLE:'#d32f2f',  XLV:'#9c27b0',
  XLP:'#0d87a5', XLU:'#558b2f', XLRE:'#8d6e63'
};

const AXIS = {
  axisLine:{lineStyle:{color:LINE}},
  axisLabel:{color:MUTE,fontSize:11,fontFamily:'"IBM Plex Mono",monospace'},
  splitLine:{lineStyle:{color:'rgba(8,10,15,.07)'}},
  axisTick:{show:false}
};
const TIP = {
  backgroundColor:PAPER,
  borderColor:INK,
  borderWidth:1.5,
  textStyle:{color:INK,fontSize:12,fontFamily:'"IBM Plex Mono",monospace'},
  extraCssText:'box-shadow:3px 3px 0 '+LINE+';border-radius:0;'
};

const fmt = v => v==null?'—':(v>0?'+':'')+v.toFixed(2)+'%';
const cls = v => v==null?'':(v>=0?'pos':'neg');
const fMoney = v => v==null?'—':(v>=1e12?(v/1e12).toFixed(2)+'T':v>=1e9?(v/1e9).toFixed(1)+'B':(v/1e6).toFixed(0)+'M');
const fVol   = v => v==null?'—':(v>=1e8?(v/1e8).toFixed(2)+'亿股':v>=1e4?Math.round(v/1e4)+'万股':String(v));

const charts = [];
function mk(id){const c=echarts.init(document.getElementById(id));charts.push(c);return c;}
window.addEventListener('resize',()=>{charts.forEach(c=>c.resize());if(mChart)mChart.resize();});

/* ---- header ---- */
document.getElementById('asof').textContent = `截至 ${D.asof}`;
document.getElementById('asofLabel').textContent = `数据截至 ${D.asof}`;
document.getElementById('spybox').innerHTML =
  `<span style="font-family:var(--font-mono);font-size:var(--text-xs);color:var(--ink-mute)">SPY&nbsp;</span>
   <span class="spy-price">${D.spy.price.toFixed(2)}</span>
   <span class="chip ${D.spy.day_chg>=0?'up':'down'}">${fmt(D.spy.day_chg)}</span>`;

/* ---- KPI row ---- */
const K = D.kpi;
document.getElementById('kpis').innerHTML = [
  {lab:'近1月领涨',val:K.best.name,  vcls:'pos',suf:fmt(K.best.ret),  note:`${K.best.ticker} · 近1月收益`},
  {lab:'近1月领跌',val:K.worst.name, vcls:'neg',suf:fmt(K.worst.ret), note:`${K.worst.ticker} · 近1月收益`},
  {lab:'风险偏好', val:K.risk_spread>=0?'偏进攻':'偏防御',
   vcls:K.risk_spread>=0?'pos':'neg',suf:fmt(K.risk_spread),
   note:'近1月顺周期 − 防御板块收益差'},
  {lab:'轮动强度 (离散度)',val:K.dispersion.toFixed(2)+'%',vcls:'',suf:'',

/* ---- heatmap ---- */
(function(){
  const H=D.horizons;
  const rows=[...D.sectors].sort((a,b)=>(b.returns['1月']??-999)-(a.returns['1月']??-999));
  const maxAbs=H.map(h=>Math.max(0.01,...rows.map(s=>Math.abs(s.returns[h]??0))));
  const mix=(a,b,t)=>a.map((x,i)=>Math.round(x+(b[i]-x)*t));
  function cellColor(v,ma){
    const t=Math.max(-1,Math.min(1,v/ma)),a=Math.pow(Math.abs(t),.7);
    return mix([247,248,244],t>=0?[211,47,47]:[0,166,118],a);
  }
  const data=[];
  rows.forEach((s,y)=>H.forEach((h,x)=>{
    const v=s.returns[h];if(v==null)return;
    const norm=Math.abs(v/maxAbs[x]);
    data.push({value:[x,y,v],real:v,
      itemStyle:{color:`rgb(${cellColor(v,maxAbs[x]).join(',')})`,borderRadius:0},
      label:{color:norm>0.45?'rgba(255,255,255,.95)':'#3d4652'}});
  }));
  const chart=mk('cHeat');
  chart.setOption({
    tooltip:{...TIP,formatter:p=>`${rows[p.value[1]].name} (${rows[p.value[1]].ticker})<br/>${H[p.value[0]]}: <b>${fmt(p.data.real)}</b>`},
    grid:{left:100,right:14,top:28,bottom:28},
    xAxis:{type:'category',data:H,position:'top',...AXIS,splitLine:{show:false},axisLine:{show:false}},
    yAxis:{type:'category',inverse:true,...AXIS,splitLine:{show:false},axisLine:{show:false},
           data:rows.map(s=>`${s.name} ${s.ticker}`)},
    series:[{type:'heatmap',data,cursor:'pointer',
             label:{show:true,fontSize:11,fontFamily:'"IBM Plex Mono",monospace',formatter:p=>p.data.real.toFixed(1)},
             itemStyle:{borderColor:PAPER,borderWidth:2},
             emphasis:{itemStyle:{shadowBlur:6,shadowColor:'rgba(0,0,0,.2)'}}}]
  });
  chart.on('click',p=>{if(p.seriesType==='heatmap')openSector(rows[p.value[1]].ticker);});
})();

/* ---- RRG ---- */
(function(){
  const pts=Object.values(D.rrg).flat().map(p=>[p[0],p[1]]);
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const r05=v=>Math.round(v*2)/2;
  const pad=(a,b)=>{const r=b-a||1;return[r05(a-r*.12-.1),r05(b+r*.12+.1)];};
  let [x0,x1]=pad(Math.min(...xs,100),Math.max(...xs,100));
  let [y0,y1]=pad(Math.min(...ys,100),Math.max(...ys,100));
  const qLab=(x,y,t,c)=>({value:[x,y],label:{show:true,position:'inside',formatter:t,color:c,fontSize:11,fontFamily:'"IBM Plex Mono",monospace',fontWeight:600}});
  const series=[{
    type:'scatter',data:[],silent:true,symbolSize:0,
    markLine:{silent:true,symbol:'none',label:{show:false},
      lineStyle:{color:LINE,type:'dashed',width:1},
      data:[{xAxis:100},{yAxis:100}]},
    markArea:{silent:true,data:[
      [{coord:[100,100],itemStyle:{color:'rgba(49,87,255,.05)'}},{coord:[x1,y1]}],
      [{coord:[x0,100],itemStyle:{color:'rgba(0,166,118,.05)'}},{coord:[100,y1]}],
      [{coord:[x0,y0],itemStyle:{color:'rgba(0,0,0,.02)'}},{coord:[100,100]}],
      [{coord:[100,y0],itemStyle:{color:'rgba(211,47,47,.05)'}},{coord:[x1,100]}],
    ]}
  },{
    type:'scatter',silent:true,symbolSize:0,z:1,
    data:[
      qLab(x1-.045*(x1-x0),y1-.06*(y1-y0),'领先','rgba(49,87,255,.7)'),
      qLab(x0+.045*(x1-x0),y1-.06*(y1-y0),'改善','rgba(0,166,118,.7)'),
      qLab(x0+.045*(x1-x0),y0+.06*(y1-y0),'落后','rgba(123,132,145,.8)'),
      qLab(x1-.045*(x1-x0),y0+.06*(y1-y0),'转弱','rgba(211,47,47,.65)'),
    ]
  }];
  const heads=[];
  Object.entries(D.rrg).forEach(([tk,trail])=>{
    series.push({type:'line',silent:true,data:trail.map(p=>[p[0],p[1]]),
      lineStyle:{color:COLOR[tk],width:1.4,opacity:.45},symbol:'none',z:2});
    const h=trail[trail.length-1];
    heads.push({name:tk,value:[h[0],h[1]],date:h[2],
      itemStyle:{color:COLOR[tk],borderColor:PAPER,borderWidth:1.5}});
  });
  series.push({type:'scatter',data:heads,symbolSize:11,z:3,cursor:'pointer',
    label:{show:true,position:'right',fontSize:10.5,fontFamily:'"IBM Plex Mono",monospace',color:INK,
           formatter:p=>D.sectors.find(s=>s.ticker===p.name)?.name||p.name},
    labelLayout:{hideOverlap:true}});
  const quadName=(x,y)=>x>=100?(y>=100?'领先':'转弱'):(y>=100?'改善':'落后');
  const chart=mk('cRRG');
  chart.setOption({
    tooltip:{...TIP,trigger:'item',formatter:p=>{
      if(!p.name)return'';
      const s=D.sectors.find(x=>x.ticker===p.name);
      return `${s.name} (${p.name}) · ${p.data.date}<br/>RS-Ratio: <b>${p.value[0]}</b> · RS-Momentum: <b>${p.value[1]}</b><br/>象限: ${quadName(p.value[0],p.value[1])}`;}},
    grid:{left:52,right:26,top:14,bottom:36},
    xAxis:{name:'RS-Ratio →',nameLocation:'middle',nameGap:26,
      nameTextStyle:{color:MUTE,fontSize:11,fontFamily:'"IBM Plex Mono",monospace'},
      min:x0,max:x1,...AXIS,axisLabel:{...AXIS.axisLabel,formatter:v=>v.toFixed(1)}},
    yAxis:{name:'RS-Momentum →',nameTextStyle:{color:MUTE,fontSize:11,fontFamily:'"IBM Plex Mono",monospace'},
      min:y0,max:y1,...AXIS,axisLabel:{...AXIS.axisLabel,formatter:v=>v.toFixed(1)}},
    series
  });
  chart.on('click',p=>{if(p.seriesType==='scatter'&&p.name)openSector(p.name);});
})();

/* ---- bar chart (by period) ---- */
(function(){
  const chart=mk('cBar'),tabs=document.getElementById('barTabs');
  function render(h){
    const rows=[...D.sectors].filter(s=>s.returns[h]!=null)
      .sort((a,b)=>a.returns[h]-b.returns[h]);
    chart.setOption({
      tooltip:{...TIP,trigger:'item',formatter:p=>`${p.name}<br/>${h}: <b>${fmt(p.value)}</b>`},
      grid:{left:100,right:44,top:10,bottom:24},
      xAxis:{type:'value',
        min:Math.floor(Math.min(...rows.map(s=>s.returns[h]),D.spy.returns[h])-1),
        max:Math.ceil(Math.max(...rows.map(s=>s.returns[h]),D.spy.returns[h])+1),
        ...AXIS,axisLabel:{...AXIS.axisLabel,formatter:'{value}%'}},
      yAxis:{type:'category',data:rows.map(s=>`${s.name} ${s.ticker}`),
        ...AXIS,splitLine:{show:false},axisLine:{show:false},
        axisLabel:{color:INK,fontSize:11.5,fontFamily:'"IBM Plex Mono",monospace'}},
      series:[{type:'bar',barWidth:11,cursor:'pointer',
        data:rows.map(s=>({value:s.returns[h],
          itemStyle:{color:s.returns[h]>=0?UP:DOWN,borderRadius:0},
          label:{position:s.returns[h]>=0?'right':'left'}})),
        label:{show:true,fontSize:10,fontFamily:'"IBM Plex Mono",monospace',color:MUTE,
          formatter:p=>fmt(p.value)},
        markLine:{silent:true,symbol:'none',
          lineStyle:{color:ACCENT,type:'dashed',width:1.2},
          label:{color:ACCENT,fontSize:10,fontFamily:'"IBM Plex Mono",monospace',
            formatter:'SPY '+fmt(D.spy.returns[h]),position:'end'},
          data:[{xAxis:D.spy.returns[h]}]}
      }]
    },true);
  }
  chart.on('click',p=>{
    if(p.seriesType!=='bar')return;
    const tk=(p.name||'').split(' ').pop();
    if(D.sectors.some(s=>s.ticker===tk))openSector(tk);
  });
  D.horizons.forEach((h,i)=>{
    const b=document.createElement('button');
    b.textContent=h; if(i===1)b.className='on';
    b.onclick=e=>{e.stopPropagation();tabs.querySelectorAll('button').forEach(x=>x.className='');b.className='on';render(h);};
    tabs.appendChild(b);
  });
  render('1月');
})();

/* ---- modals ---- */
const ovl=document.getElementById('ovl'),modal=document.getElementById('modal');
let mChart=null;

const QMAP={};
Object.entries(D.stocks).forEach(([sec,list])=>list.forEach(q=>QMAP[q.t]={...q,kind:'个股',sec}));
Object.entries(D.etfs).forEach(([sec,list])=>list.forEach(q=>QMAP[q.t]={...q,kind:'ETF',sec}));

function qRow(q){
  return `<tr class="clk" data-t="${q.t}">
    <td><span class="tname">${q.n}</span><span class="tcode">${q.t}</span></td>
    <td>${q.p==null?'—':q.p.toFixed(2)}</td>
    <td class="${cls(q.chg)}">${fmt(q.chg)}</td>
    <td class="${cls(q.m1)}">${fmt(q.m1)}</td>
    <td style="color:var(--ink-mute)">${q.vr==null?'—':q.vr.toFixed(2)+'x'}</td>
  </tr>`;
}
function qTable(list){
  if(!list||!list.length)return'<div class="nod">暂无数据</div>';
  return`<table class="dtable"><tr><th>名称</th><th>最新</th><th>今日</th><th>近1月</th><th>量比</th></tr>
    ${list.map(qRow).join('')}</table>`;
}

function openSector(tk){
  const s=D.sectors.find(x=>x.ticker===tk);
  if(!s)return;
  const grp=s.group==='cyc'?'顺周期':'防御';
  document.getElementById('mHead').innerHTML=
    `<span class="m-title">${s.name}</span><span class="m-ticker">${tk}</span>
     <span class="m-badge">${grp}</span><span class="m-spacer"></span>
     <span class="m-price">${s.price.toFixed(2)}</span>
     <span class="chip ${s.day_chg>=0?'up':'down'}">${fmt(s.day_chg)}</span>
     <button class="m-close" onclick="closeModal()">✕</button>`;

  const cols=['今日',...D.horizons];
  const sec=[s.day_chg,...D.horizons.map(h=>s.returns[h])];
  const spy=[D.spy.day_chg,...D.horizons.map(h=>D.spy.returns[h])];
  const ex=sec.map((v,i)=>(v==null||spy[i]==null)?null:v-spy[i]);
  const rrow=(lab,arr,bold)=>`<tr><td class="rlab">${lab}</td>${arr.map(v=>
    `<td class="${cls(v)}" ${bold?'style="font-weight:700"':''}>${fmt(v)}</td>`).join('')}</tr>`;
  document.getElementById('mRets').innerHTML=
    `<table class="dtable"><tr><th></th>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>
     ${rrow(s.name,sec,true)}${rrow('标普500',spy)}${rrow('超额',ex)}</table>`;

  document.getElementById('mEtfs').innerHTML=qTable(D.etfs[tk]);
  document.getElementById('mStocks').innerHTML=qTable(D.stocks[tk]);
  modal.querySelectorAll('tr.clk').forEach(r=>{
    r.style.cursor='pointer';
    r.onclick=()=>{ window.top.location.href='/work/sector-rotation/'+r.dataset.t; };
  });

  ovl.classList.add('open');modal.classList.add('open');
  document.body.style.overflow='hidden';

  requestAnimationFrame(()=>{
    const el=document.getElementById('mChart');
    if(!mChart)mChart=echarts.init(el);
    const hex=COLOR[tk]||ACCENT;
    mChart.setOption({
      tooltip:{...TIP,trigger:'axis',axisPointer:{type:'line',lineStyle:{color:LINE}},
        valueFormatter:v=>v==null?'—':'$'+v.toFixed(2)},
      grid:{left:54,right:14,top:12,bottom:22},
      xAxis:{type:'category',data:D.excess.dates,boundaryGap:false,...AXIS,splitLine:{show:false}},
      yAxis:{type:'value',scale:true,...AXIS},
      series:[{type:'line',data:D.px[tk],showSymbol:false,cursor:'default',
        lineStyle:{width:1.8,color:hex},itemStyle:{color:hex},
        areaStyle:{color:hex,opacity:.07}}]
    },true);
    mChart.resize();
  });
}
function closeModal(){
  ovl.classList.remove('open');modal.classList.remove('open');
  document.body.style.overflow='';
}
ovl.onclick=closeModal;

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
});

  `数据源: Yahoo Finance · 板块代理为 SPDR 行业 ETF · RRG 为周频标准化指标，以 100 为中心，轨迹通常顺时针旋转: 改善 → 领先 → 转弱 → 落后<br/>
   更新数据: <code>cd scripts/sector-rotation && .venv/bin/python fetch_data.py</code> 后刷新本页 · 页面生成于 ${D.generated}`;
