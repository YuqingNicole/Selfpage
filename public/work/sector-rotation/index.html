<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股板块轮动看板</title>
<style>
  /* ================= 设计令牌 (leaderboard 风格: 奶油纸底/黑描边/靛蓝/零圆角) ================= */
  :root{
    --paper:#f7f8f4; --paper-deep:#e9ece4; --card:#fff;
    --ink:#080a0f; --ink-soft:#3d4652; --ink-mute:#7b8491;
    --line:#d9ded4; --hairline:#e9ece4;
    --accent:#3157ff; --accent-deep:#1536d1; --accent-dim:rgba(49,87,255,.09);
    --up:#d63026; --down:#00a676;
    --mono:"IBM Plex Mono",ui-monospace,"SFMono-Regular",Menlo,"PingFang SC","Microsoft YaHei",monospace;
    --ease:cubic-bezier(.22,1,.36,1); --dur:.18s;
  }
  *{margin:0;padding:0;box-sizing:border-box;border-radius:0}
  html{-webkit-font-smoothing:antialiased}
  body{
    background:var(--paper); color:var(--ink);
    font:13px/1.6 "Hanken Grotesk",-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-variant-numeric:tabular-nums;
  }
  ::selection{background:var(--accent-dim)}
  button:focus-visible,.pill:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .pos{color:var(--up)} .neg{color:var(--down)}
  .mlab{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;color:var(--ink-mute)}

  /* ================= 页头 (编辑风 hero) ================= */
  .page-header{background:var(--paper);border-bottom:3px solid var(--ink)}
  .hwrap{max-width:1400px;margin:0 auto;padding:20px 24px 0}
  .meta-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  .hero{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;
    padding:14px 0 20px}
  h1{font-size:clamp(28px,3.4vw,40px);font-weight:900;letter-spacing:-.02em;line-height:1.05}
  .lede{color:var(--ink-soft);font-size:12.5px;margin-top:8px}
  .spybox{display:flex;align-items:baseline;gap:10px}
  .spybox b{font-size:26px;font-weight:800}
  .chip{padding:3px 10px;font-family:var(--mono);font-size:11.5px;font-weight:700;
    background:#fff;border:1.5px solid var(--ink)}
  .chip.up{color:var(--up)} .chip.down{color:var(--down)}

  .wrap{max-width:1400px;margin:0 auto;padding:20px 24px}

  /* ================= KPI ================= */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border:1.5px solid var(--ink);padding:14px 16px}
  .kpi .lab{display:flex;justify-content:space-between;align-items:center;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--ink-mute)}
  .kpi .lab .suf{font-weight:700;font-size:11.5px}
  .kpi .val{font-size:24px;font-weight:800;letter-spacing:-.01em;margin:6px 0 6px}
  .kpi .note{color:var(--ink-mute);font-size:10.5px;font-family:var(--mono);
    border-top:1px solid var(--hairline);padding-top:7px}

  /* ================= 板块 pill 条 ================= */
  .pills{display:flex;flex-wrap:nowrap;gap:8px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none}
  .pills::-webkit-scrollbar{display:none}
  .pill{background:var(--card);border:1.5px solid var(--ink);
    padding:7px 13px;display:flex;align-items:center;gap:8px;
    cursor:pointer;white-space:nowrap;flex-shrink:0;
    transition:all var(--dur) var(--ease)}
  .pill:hover{border-color:var(--accent);background:var(--accent-dim);transform:translateY(-1px)}
  .pill:active{transform:translateY(0)}
  .pill .pn{font-size:12.5px;font-weight:700;color:var(--ink)}
  .pill .pt{font-family:var(--mono);color:var(--ink-mute);font-size:10px;letter-spacing:.06em}
  .pill .pc{font-family:var(--mono);font-size:11.5px;font-weight:700}

  /* ================= 卡片网格 ================= */
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
  .card{background:var(--card);border:2px solid var(--ink);padding:14px 16px 12px;min-width:0}
  .span7{grid-column:span 7}.span5{grid-column:span 5}
  .card h2{font-size:15px;font-weight:800;display:inline;letter-spacing:-.01em}
  .card .hint{font-family:var(--mono);color:var(--ink-mute);font-size:10px;margin-left:8px;letter-spacing:.04em}
  .chead{display:flex;justify-content:space-between;align-items:center;
    margin-bottom:8px;padding-bottom:9px;border-bottom:1.5px solid var(--ink)}
  .chart{width:100%}
  #cHeat{height:452px} #cRRG{height:406px} #cEx{height:420px} #cBar{height:420px}

  /* RRG 滑块控件 */
  .rrg-ctrl{
    display:flex;align-items:center;gap:10px;
    border-bottom:1px solid var(--hairline);padding:7px 0 8px;margin-bottom:4px
  }
  .rrg-wlabel{
    font-family:var(--mono);font-size:11px;font-weight:700;
    color:var(--accent);letter-spacing:.08em;min-width:38px
  }
  .rrg-slider{
    flex:1;-webkit-appearance:none;appearance:none;
    height:2px;background:var(--hairline);cursor:pointer;outline:none;
    accent-color:var(--accent)
  }
  .rrg-slider::-webkit-slider-thumb{
    -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
    background:var(--accent);border:2px solid #fff;
    box-shadow:0 0 0 1.5px var(--accent)
  }
  .rrg-slabel{font-family:var(--mono);font-size:10px;color:var(--ink-mute);letter-spacing:.06em}

  /* 周期切换 */
  .tabs{display:flex;gap:0}
  .tabs button{
    background:#fff;border:1.5px solid var(--ink);border-left-width:0;color:var(--ink-soft);
    padding:4px 12px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;
    cursor:pointer;transition:all var(--dur) var(--ease)}
  .tabs button:first-child{border-left-width:1.5px}
  .tabs button:hover{color:var(--accent)}
  .tabs button.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}

  footer{color:var(--ink-mute);font-family:var(--mono);font-size:10.5px;margin-top:20px;
    line-height:2;border-top:1px solid var(--line);padding-top:14px;letter-spacing:.03em}
  footer code{background:var(--paper-deep);padding:1px 7px;color:var(--ink);font-size:10.5px}

  /* ================= 弹层系统 ================= */
  .overlay{position:fixed;inset:0;background:rgba(8,10,15,.45);z-index:900;
    opacity:0;visibility:hidden;transition:opacity .22s var(--ease),visibility .22s}
  .overlay.open{opacity:1;visibility:visible}
  .modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-49%);
    width:min(780px,calc(100% - 28px));max-height:86vh;overflow-y:auto;
    background:var(--paper);border:2px solid var(--ink);z-index:901;
    box-shadow:8px 8px 0 rgba(8,10,15,.15);
    opacity:0;visibility:hidden;
    transition:opacity .2s var(--ease),transform .2s var(--ease),visibility .2s}
  .modal.open{opacity:1;visibility:visible;transform:translate(-50%,-50%)}
  .modal::-webkit-scrollbar{width:4px}
  .modal::-webkit-scrollbar-thumb{background:var(--line)}

  .m-head{position:sticky;top:0;z-index:2;background:var(--ink);color:#fff;
    padding:13px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    border-bottom:2px solid var(--ink)}
  .m-title{font-size:17px;font-weight:800;letter-spacing:.02em}
  .m-ticker{font-family:var(--mono);font-size:11px;opacity:.65;letter-spacing:.08em}
  .m-badge{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;
    border:1px solid rgba(255,255,255,.4);padding:2px 8px}
  .m-spacer{flex:1}
  .m-price{font-size:19px;font-weight:800}
  .m-back,.m-close{border:1px solid rgba(255,255,255,.4);background:transparent;
    color:#fff;cursor:pointer;font-family:var(--mono);transition:all var(--dur) var(--ease)}
  .m-back{font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 12px 4px 8px;margin-right:2px}
  .m-close{font-size:13px;width:28px;height:28px;line-height:1}
  .m-back:hover,.m-close:hover{background:rgba(255,255,255,.15)}
  .m-body{padding:16px 18px 20px}
  .sec-t{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink);
    margin:16px 0 8px;border-left:3px solid var(--accent);padding-left:8px;letter-spacing:.12em}
  .sec-t:first-child{margin-top:0}
  .sec-t .lite{color:var(--ink-mute);font-weight:400}

  /* ================= 表格 ================= */
  .dtable{width:100%;border-collapse:collapse;font-size:12.5px;background:#fff;
    border:1.5px solid var(--ink)}
  .dtable th{font-family:var(--mono);font-size:10px;color:var(--ink-mute);font-weight:700;
    text-align:right;padding:7px 10px;border-bottom:1.5px solid var(--ink);
    white-space:nowrap;letter-spacing:.08em}
  .dtable th:first-child,.dtable td:first-child{text-align:left}
  .dtable td{padding:8px 10px;border-bottom:1px solid var(--hairline);text-align:right;white-space:nowrap}
  .dtable tr:last-child td{border-bottom:none}
  .dtable .tname{font-weight:700;color:var(--ink)}
  .dtable .tcode{font-family:var(--mono);color:var(--ink-mute);font-size:10px;margin-left:6px;letter-spacing:.04em}
  .dtable .rlab{color:var(--ink-mute);font-family:var(--mono);font-size:10.5px;font-weight:700}
  .dtable tr.clk{cursor:pointer;transition:background var(--dur) var(--ease)}
  .dtable tr.clk:hover td{background:var(--accent-dim)}
  #mChart{height:230px;background:#fff;border:1.5px solid var(--ink)}

  /* ================= 指标格子 ================= */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .stat{background:#fff;border:1.5px solid var(--ink);padding:9px 11px;min-width:0}
  .stat.wide{grid-column:span 2}
  .stat .sl{font-family:var(--mono);font-size:9.5px;color:var(--ink-mute);
    white-space:nowrap;letter-spacing:.08em}
  .stat .sv{font-size:14px;font-weight:800;margin-top:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nod{color:var(--ink-mute);font-family:var(--mono);font-size:11px;padding:4px 0}
  #mRets,#mEtfs,#mStocks{overflow-x:auto}

  /* ================= 响应式 ================= */
  @media(max-width:1080px){
    .span7,.span5{grid-column:span 12}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .stats{grid-template-columns:repeat(2,1fr)}
  }
  @media(max-width:640px){
    .modal{left:0;right:0;bottom:0;top:auto;transform:translateY(100%);
      width:100%;max-height:88vh}
    .modal.open{transform:translateY(0)}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .pill{flex-shrink:0}
    .footer-cmd{display:none}
  }
</style>
</head>
<body>
<header class="page-header">
  <div class="hwrap">
    <div class="meta-top">
      <span class="mlab">US SECTOR ROTATION · GICS 11 SPDR ETF</span>
      <span class="mlab" id="asof"></span>
    </div>
    <div class="hero">
      <div>
        <h1>美股板块轮动看板</h1>
        <p class="lede">红涨绿跌 · 收益热力 / RRG 相对强弱 / 超额收益 / 分周期对比 · 点击板块查看个股与 ETF 详情</p>
      </div>
      <div class="spybox" id="spybox"></div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="kpis" id="kpis"></div>
  <div class="pills" id="pills"></div>

  <div class="grid">
    <div class="card span7">
      <div class="chead">
        <div><h2>板块收益热力图</h2><span class="hint">单位 % · 每列独立色阶 · 点击板块查看详情</span></div>
      </div>
      <div id="cHeat" class="chart"></div>
    </div>
    <div class="card span5">
      <div class="chead">
        <div><h2>相对强弱轮转 (RRG)</h2><span class="hint">周频 · 顺时针轮动 · 悬停高亮</span></div>
      </div>
      <div class="rrg-ctrl">
        <span class="rrg-wlabel" id="rrgWL">W12</span>
        <input type="range" class="rrg-slider" id="rrgSlider" min="1" max="12" value="12" step="1">
        <span class="rrg-slabel">← 回看</span>
      </div>
      <div id="cRRG" class="chart"></div>
    </div>
    <div class="card span7">
      <div class="chead">
        <div><h2>相对标普500超额收益</h2><span class="hint">近一年 · 起点归零 · 单位 %</span></div>
      </div>
      <div id="cEx" class="chart"></div>
    </div>
    <div class="card span5">
      <div class="chead">
        <div><h2>分周期板块收益</h2><span class="hint">虚线为 SPY</span></div>
        <div class="tabs" id="barTabs"></div>
      </div>
      <div id="cBar" class="chart"></div>
    </div>
  </div>

  <footer id="foot"></footer>
</div>

<!-- 板块详情弹层 -->
<div class="overlay" id="ovl"></div>
<div class="modal" id="modal">
  <div class="m-head" id="mHead"></div>
  <div class="m-body">
    <div class="sec-t">分周期收益 vs 标普500</div>
    <div id="mRets"></div>
    <div class="sec-t">近一年价格走势</div>
    <div id="mChart"></div>
    <div class="sec-t">相关 ETF <span class="lite">/ 点击查看详情</span></div>
    <div id="mEtfs"></div>
    <div class="sec-t">代表个股 <span class="lite">/ 点击查看详情</span></div>
    <div id="mStocks"></div>
  </div>
</div>


<script src="vendor/echarts.min.js"></script>
<script src="data.js"></script>
<script>
const D = window.SECTOR_DATA;
const UP='#d63026', DOWN='#00a676', ACCENT='#3157ff';
const COLOR = {XLK:'#3157ff',XLC:'#7c70ec',XLY:'#e66b00',XLF:'#0d87a5',XLI:'#7b8491',
               XLB:'#b08900',XLE:'#d63026',XLV:'#c2185b',XLP:'#00a676',XLU:'#5f51c9',XLRE:'#8d6e63'};
const AXIS = {axisLine:{lineStyle:{color:'#d9ded4'}}, axisLabel:{color:'#7b8491',fontSize:11},
              splitLine:{lineStyle:{color:'rgba(8,10,15,.06)'}},
              axisTick:{show:false}};
const TIP = {backgroundColor:'#ffffff',borderColor:'#080a0f',borderWidth:1.5,
             textStyle:{color:'#080a0f',fontSize:12},
             extraCssText:'box-shadow:4px 4px 0 rgba(8,10,15,.12);border-radius:0;'};
const fmt = v => v==null?'—':(v>0?'+':'')+v.toFixed(2)+'%';
const cls = v => v==null?'':(v>=0?'pos':'neg');
/* 金额(美元): >=1e12 万亿, >=1e8 亿, 否则 M */
const fMoney = v => v==null?'—':(v>=1e12?(v/1e12).toFixed(2)+'万亿':v>=1e8?(v/1e8).toFixed(0)+'亿':(v/1e6).toFixed(0)+'M');
/* 成交量(股) */
const fVol = v => v==null?'—':(v>=1e8?(v/1e8).toFixed(2)+'亿股':v>=1e4?Math.round(v/1e4)+'万股':String(v));
const charts = [];
function mk(id){const c=echarts.init(document.getElementById(id));charts.push(c);return c;}
window.addEventListener('resize',()=>{charts.forEach(c=>c.resize()); if(mChart)mChart.resize();});

/* ---------- 路由同步: 通知父页面更新地址栏 ---------- */
function syncRoute(tk){
  try{ window.parent.postMessage({type:'sector-nav',sector:tk}, window.location.origin); }catch(e){}
}

/* ---------- 头部 & KPI ---------- */
document.getElementById('asof').textContent = `UPDATED ${D.asof} · 红涨绿跌`;
document.getElementById('spybox').innerHTML =
  `<span class="mlab">标普500 (SPY)</span><b>${D.spy.price.toFixed(2)}</b>
   <span class="chip ${D.spy.day_chg>=0?'up':'down'}">${fmt(D.spy.day_chg)}</span>`;

const K = D.kpi;
document.getElementById('kpis').innerHTML = [
  {lab:'近1月领涨', val:`${K.best.name}`, vcls:'pos', suf:fmt(K.best.ret),
   note:`${K.best.ticker} · 近1月收益`},
  {lab:'近1月领跌', val:`${K.worst.name}`, vcls:'neg', suf:fmt(K.worst.ret),
   note:`${K.worst.ticker} · 近1月收益`},
  {lab:'风险偏好', val:(K.risk_spread>=0?'偏进攻':'偏防御'),
   vcls:K.risk_spread>=0?'pos':'neg', suf:fmt(K.risk_spread),
   note:'近1月顺周期 − 防御板块收益差'},
  {lab:'轮动强度 (离散度)', val:K.dispersion.toFixed(2)+'%', vcls:'', suf:'',
   note:`跑赢大盘的板块 ${K.beat_spy}/${K.total} (近1月)`},
].map(k=>`<div class="kpi">
    <div class="lab"><span>${k.lab}</span><span class="suf ${k.vcls}">${k.suf||''}</span></div>
    <div class="val ${k.vcls}">${k.val}</div>
    <div class="note">${k.note}</div></div>`).join('');

/* ---------- 板块 pill 条 ---------- */
document.getElementById('pills').innerHTML = D.sectors.map(s=>
  `<div class="pill" data-tk="${s.ticker}" tabindex="0">
     <span class="pn">${s.name}</span><span class="pt">${s.ticker}</span>
     <span class="pc ${cls(s.day_chg)}">${fmt(s.day_chg)}</span>
   </div>`).join('');
document.querySelectorAll('.pill').forEach(p=>{
  p.onclick=()=>openSector(p.dataset.tk);
  p.onkeydown=e=>{if(e.key==='Enter')openSector(p.dataset.tk);};
});

/* ---------- 热力图 (每列独立归一) ---------- */
(function(){
  const H = D.horizons;
  const rows = [...D.sectors].sort((a,b)=>(b.returns['1月']??-999)-(a.returns['1月']??-999));
  const maxAbs = H.map(h=>Math.max(0.01,...rows.map(s=>Math.abs(s.returns[h]??0))));
  const mix=(a,b,t)=>a.map((x,i)=>Math.round(x+(b[i]-x)*t));
  function cellColor(v,ma){
    const t=Math.max(-1,Math.min(1,v/ma)), a=Math.pow(Math.abs(t),0.7);
    return mix([247,248,244], t>=0?[214,48,38]:[0,166,118], a);
  }
  const data=[];
  rows.forEach((s,y)=>H.forEach((h,x)=>{
    const v=s.returns[h];
    if(v==null) return;
    const norm=Math.abs(v/maxAbs[x]);
    data.push({value:[x,y,v], real:v,
      itemStyle:{color:`rgb(${cellColor(v,maxAbs[x]).join(',')})`,borderRadius:0},
      label:{color:norm>0.45?'rgba(255,255,255,.95)':'#3d4652'}});
  }));
  const chart = mk('cHeat');
  chart.setOption({
    tooltip:{...TIP,formatter:p=>`${rows[p.value[1]].name} (${rows[p.value[1]].ticker})<br/>${H[p.value[0]]}: <b>${fmt(p.data.real)}</b>`},
    grid:{left:96,right:14,top:30,bottom:30},
    xAxis:{type:'category',data:H,position:'top',...AXIS,splitLine:{show:false},axisLine:{show:false},
           axisLabel:{color:'#7b8491',fontSize:12}},
    yAxis:{type:'category',inverse:true,...AXIS,splitLine:{show:false},axisLine:{show:false},
           data:rows.map(s=>`${s.name} ${s.ticker}`),axisLabel:{color:'#3d4652',fontSize:12}},
    series:[{type:'heatmap',data,cursor:'pointer',label:{show:true,fontSize:11.5,
             formatter:p=>p.data.real.toFixed(1)},
             itemStyle:{borderColor:'#f7f8f4',borderWidth:3},
             emphasis:{itemStyle:{shadowBlur:8,shadowColor:'rgba(8,10,15,.3)'}}}]
  });
  chart.on('click', p=>{ if(p.seriesType==='heatmap') openSector(rows[p.value[1]].ticker); });
})();

/* ---------- RRG ---------- */
(function(){
  const TICKERS = Object.keys(D.rrg);
  const MAX_W   = 12;

  /* 固定坐标轴范围（全12周数据） */
  const allPts = Object.values(D.rrg).flat();
  const xs = allPts.map(p=>p[0]), ys = allPts.map(p=>p[1]);
  const r05 = v => Math.round(v*2)/2;
  const pad  = (a,b) => { const r=b-a||1; return [r05(a-r*.14-.1), r05(b+r*.14+.1)]; };
  const [x0,x1] = pad(Math.min(...xs,100), Math.max(...xs,100));
  const [y0,y1] = pad(Math.min(...ys,100), Math.max(...ys,100));

  const quadName = (x,y) => x>=100 ? (y>=100?'领先':'转弱') : (y>=100?'改善':'落后');

  const qLab = (x,y,t,c) => ({
    value:[x,y],
    label:{show:true,position:'inside',formatter:t,color:c,fontSize:12,fontWeight:700}
  });

  /* 背景象限底色 + 中轴 — 不随状态变化 */
  const BASE = [
    {
      type:'scatter', data:[], silent:true, symbolSize:0,
      markLine:{silent:true,symbol:'none',label:{show:false},
        lineStyle:{color:'#c3c7bb',type:'dashed',width:1},
        data:[{xAxis:100},{yAxis:100}]},
      markArea:{silent:true,data:[
        [{coord:[100,100],itemStyle:{color:'rgba(49,87,255,.05)'}},{coord:[x1,y1]}],
        [{coord:[x0,100],itemStyle:{color:'rgba(0,166,118,.05)'}},{coord:[100,y1]}],
        [{coord:[x0,y0],itemStyle:{color:'rgba(8,10,15,.03)'}},{coord:[100,100]}],
        [{coord:[100,y0],itemStyle:{color:'rgba(214,48,38,.05)'}},{coord:[x1,100]}],
      ]}
    },
    {
      type:'scatter', silent:true, symbolSize:0, z:1,
      data:[
        qLab(x1-.045*(x1-x0), y1-.06*(y1-y0), '领先', 'rgba(49,87,255,.7)'),
        qLab(x0+.045*(x1-x0), y1-.06*(y1-y0), '改善', 'rgba(0,166,118,.7)'),
        qLab(x0+.045*(x1-x0), y0+.06*(y1-y0), '落后', 'rgba(123,132,145,.85)'),
        qLab(x1-.045*(x1-x0), y0+.06*(y1-y0), '转弱', 'rgba(214,48,38,.65)'),
      ]
    }
  ];

  const chart = mk('cRRG');
  let hoveredTk = null;
  let weekDepth = MAX_W;

  function buildSeries(depth, hovered) {
    const series = [...BASE];

    TICKERS.forEach(tk => {
      const trail = D.rrg[tk].slice(0, depth);
      const dim   = hovered !== null && hovered !== tk;
      const hex   = COLOR[tk];
      const n     = trail.length;

      /* 轨迹线：旧点透明度低、新点透明度高，dim时降为极淡 */
      series.push({
        id: 'trail_' + tk,
        type: 'line', silent: true, z: 2,
        data: trail.map(p=>[p[0],p[1]]),
        lineStyle: {
          color: dim ? '#c3c7bb' : hex,
          width: (!dim && hovered === tk) ? 2.4 : (dim ? 1 : 1.5),
          opacity: dim ? 0.12 : (hovered === tk ? 0.75 : 0.35),
        },
        symbol: 'none',
      });

      /* 尾部方向箭头（仅 hover 时显示） */
      if (hovered === tk && n >= 2) {
        const a = trail[n-2], b = trail[n-1];
        series.push({
          id: 'arrow_' + tk,
          type: 'scatter', silent: true, z: 5,
          data: [[b[0], b[1]]],
          symbol: 'arrow', symbolSize: 9,
          symbolRotate: -(Math.atan2(b[1]-a[1], b[0]-a[0]) * 180 / Math.PI),
          itemStyle: { color: hex },
        });
      }

      /* 头部圆点 */
      const h = trail[n - 1];
      if (!h) return;
      series.push({
        id: 'head_' + tk,
        type: 'scatter', name: tk, z: 3,
        data: [{ name:tk, value:[h[0],h[1]], date:h[2] }],
        symbolSize: (hovered === tk) ? 14 : (dim ? 7 : 10),
        cursor: 'pointer',
        itemStyle: {
          color: dim ? '#c3c7bb' : hex,
          borderColor: '#fff', borderWidth: 1.5,
          opacity: dim ? 0.2 : 1,
        },
        label: {
          show: !dim,
          position: 'right',
          fontSize: hovered === tk ? 12 : 10.5,
          fontWeight: hovered === tk ? 700 : 400,
          color: hovered === tk ? hex : '#3d4652',
          formatter: p => D.sectors.find(s=>s.ticker===p.name)?.name || p.name,
        },
        labelLayout: { hideOverlap: true },
      });
    });

    return series;
  }

  function render(depth, hovered) {
    chart.setOption({
      tooltip:{
        ...TIP, trigger:'item',
        formatter: p => {
          if (!p.name || !COLOR[p.name]) return '';
          const s   = D.sectors.find(x => x.ticker === p.name);
          const trail = D.rrg[p.name];
          const h   = trail[depth - 1];
          const prev = depth > 1 ? trail[depth - 2] : null;
          const trend = prev
            ? `${h[0]>prev[0]?'↗ RS 增强':'↙ RS 减弱'} · ${h[1]>prev[1]?'↑ 动量上行':'↓ 动量下行'}`
            : '';
          return `<b>${s?.name||p.name}</b> <span style="opacity:.5;font-size:10px">${p.name}</span><br/>`
            + `${h[2]} &nbsp;·&nbsp; <b>${quadName(h[0],h[1])}</b><br/>`
            + `RS-Ratio <b>${h[0].toFixed(2)}</b>　RS-Mom <b>${h[1].toFixed(2)}</b>`
            + (trend ? `<br/><span style="opacity:.6;font-size:10px">${trend}</span>` : '');
        }
      },
      grid: { left:50, right:26, top:16, bottom:40 },
      xAxis: {
        name:'RS-RATIO →', nameLocation:'middle', nameGap:26,
        nameTextStyle:{color:'#7b8491',fontSize:10,fontFamily:'IBM Plex Mono,ui-monospace,monospace'},
        min:x0, max:x1, ...AXIS,
        axisLabel:{...AXIS.axisLabel,formatter:v=>v.toFixed(1)}
      },
      yAxis: {
        name:'RS-MOMENTUM →',
        nameTextStyle:{color:'#7b8491',fontSize:10,fontFamily:'IBM Plex Mono,ui-monospace,monospace'},
        min:y0, max:y1, ...AXIS,
        axisLabel:{...AXIS.axisLabel,formatter:v=>v.toFixed(1)}
      },
      series: buildSeries(depth, hovered),
    }, false);
  }

  render(weekDepth, null);

  /* hover 高亮 */
  chart.on('mouseover', p => {
    if (p.seriesType === 'scatter' && COLOR[p.name]) {
      hoveredTk = p.name;
      render(weekDepth, hoveredTk);
    }
  });
  chart.on('mouseout', p => {
    if (p.seriesType === 'scatter' && COLOR[p.name]) {
      hoveredTk = null;
      render(weekDepth, null);
    }
  });
  chart.on('click', p => {
    if (p.seriesType === 'scatter' && p.name) openSector(p.name);
  });

  /* 时间滑块 */
  const slider = document.getElementById('rrgSlider');
  const wLabel = document.getElementById('rrgWL');
  slider.addEventListener('input', () => {
    weekDepth = +slider.value;
    wLabel.textContent = 'W' + weekDepth;
    render(weekDepth, hoveredTk);
  });
})();

/* ---------- 超额收益曲线 ---------- */

    name:tk,type:'line',data:vals,showSymbol:false,smooth:false,

  mk('cEx').setOption({

    legend:{type:'scroll',top:0,icon:'rect',itemWidth:10,itemHeight:3,
      textStyle:{color:'#7b8491',fontSize:11},inactiveColor:'#c3c7bb',
      pageTextStyle:{color:'#7b8491'}},
    grid:{left:52,right:16,top:40,bottom:32},

        lineStyle:{color:'#c3c7bb',width:1},data:[{yAxis:0}]}}]

/* ---------- 分周期条形图 ---------- */
(function(){
  const chart=mk('cBar'), tabs=document.getElementById('barTabs');
  function render(h){
    const rows=[...D.sectors].filter(s=>s.returns[h]!=null)
      .sort((a,b)=>a.returns[h]-b.returns[h]);   // 升序 → 最大值在顶部
    chart.setOption({
      tooltip:{...TIP,trigger:'item',formatter:p=>`${p.name}<br/>${h}: <b>${fmt(p.value)}</b>`},
      grid:{left:96,right:44,top:14,bottom:28},
      xAxis:{type:'value',
        min:Math.floor(Math.min(...rows.map(s=>s.returns[h]),D.spy.returns[h])-1),
        max:Math.ceil(Math.max(...rows.map(s=>s.returns[h]),D.spy.returns[h])+1),
        ...AXIS,axisLabel:{...AXIS.axisLabel,formatter:'{value}%'}},
      yAxis:{type:'category',data:rows.map(s=>`${s.name} ${s.ticker}`),
        ...AXIS,splitLine:{show:false},axisLine:{show:false},
        axisLabel:{color:'#3d4652',fontSize:11.5}},
      series:[{type:'bar',barWidth:13,cursor:'pointer',
        data:rows.map(s=>({value:s.returns[h],
          itemStyle:{color:s.returns[h]>=0?UP:DOWN,borderRadius:0},
          label:{position:s.returns[h]>=0?'right':'left'}})),
        label:{show:true,fontSize:10.5,color:'#7b8491',
          formatter:p=>fmt(p.value)},
        markLine:{silent:true,symbol:'none',
          lineStyle:{color:ACCENT,type:'dashed',width:1.2},
          label:{color:ACCENT,fontSize:10.5,formatter:'SPY '+fmt(D.spy.returns[h]),position:'end'},
          data:[{xAxis:D.spy.returns[h]}]}
      }]
    },true);
  }
  chart.on('click', p=>{
    if(p.seriesType!=='bar') return;
    const tk = (p.name||'').split(' ').pop();
    if(D.sectors.some(s=>s.ticker===tk)) openSector(tk);
  });
  D.horizons.forEach((h,i)=>{
    const b=document.createElement('button');
    b.textContent=h; if(i===1)b.className='on';
    b.onclick=(e)=>{e.stopPropagation();tabs.querySelectorAll('button').forEach(x=>x.className='');b.className='on';render(h);};
    tabs.appendChild(b);
  });
  render('1月');
})();

/* ---------- 板块详情弹层 ---------- */
const ovl=document.getElementById('ovl'), modal=document.getElementById('modal');
let mChart=null;

/* 全部标的索引: ticker -> {行情..., kind, sec} */
const QMAP={};
Object.entries(D.stocks).forEach(([sec,list])=>list.forEach(q=>QMAP[q.t]={...q,kind:'个股',sec}));
Object.entries(D.etfs).forEach(([sec,list])=>list.forEach(q=>QMAP[q.t]={...q,kind:'ETF',sec}));

function qRow(q){
  return `<tr class="clk" data-t="${q.t}">
    <td><span class="tname">${q.n}</span><span class="tcode">${q.t}</span></td>
    <td>${q.p==null?'—':q.p.toFixed(2)}</td>
    <td class="${cls(q.chg)}">${fmt(q.chg)}</td>
    <td class="${cls(q.m1)}">${fmt(q.m1)}</td>
    <td style="color:var(--ink-mute)">${q.vr==null?'—':q.vr.toFixed(2)+'x'}</td>
  </tr>`;
}
function qTable(list){
  if(!list||!list.length) return '<div class="nod">暂无数据</div>';
  return `<table class="dtable"><tr><th>名称</th><th>最新</th><th>今日</th><th>近1月</th><th>量比</th></tr>
    ${list.map(qRow).join('')}</table>`;
}

function openSector(tk){
  const s=D.sectors.find(x=>x.ticker===tk);
  if(!s) return;
  const grp=s.group==='cyc'?'顺周期':'防御';
  document.getElementById('mHead').innerHTML=
    `<span class="m-title">${s.name}</span><span class="m-ticker">${tk}</span>
     <span class="m-badge">${grp}</span><span class="m-spacer"></span>
     <span class="m-price">${s.price.toFixed(2)}</span>
     <span class="chip ${s.day_chg>=0?'up':'down'}">${fmt(s.day_chg)}</span>
     <button class="m-close" onclick="closeModal()">✕</button>`;

  // 分周期收益表: 板块 / SPY / 超额
  const cols=['今日',...D.horizons];
  const sec=[s.day_chg,...D.horizons.map(h=>s.returns[h])];
  const spy=[D.spy.day_chg,...D.horizons.map(h=>D.spy.returns[h])];
  const ex=sec.map((v,i)=>(v==null||spy[i]==null)?null:v-spy[i]);
  const rrow=(lab,arr,bold)=>`<tr><td class="rlab">${lab}</td>${arr.map(v=>
    `<td class="${cls(v)}" ${bold?'style="font-weight:700"':''}>${fmt(v)}</td>`).join('')}</tr>`;
  document.getElementById('mRets').innerHTML=
    `<table class="dtable"><tr><th></th>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>
     ${rrow(s.name,sec,true)}${rrow('标普500',spy)}${rrow('超额',ex)}</table>`;

  document.getElementById('mEtfs').innerHTML=qTable(D.etfs[tk]);
  document.getElementById('mStocks').innerHTML=qTable(D.stocks[tk]);
  modal.querySelectorAll('tr.clk').forEach(r=>r.onclick=()=>openQuote(r.dataset.t));

  ovl.classList.add('open'); modal.classList.add('open');
  document.body.style.overflow='hidden';
  syncRoute(tk);

  requestAnimationFrame(()=>{
    const el=document.getElementById('mChart');
    if(!mChart) mChart=echarts.init(el);
    const hex=COLOR[tk];
    mChart.setOption({
      tooltip:{...TIP,trigger:'axis',axisPointer:{type:'line',lineStyle:{color:'#c3c7bb'}},
        valueFormatter:v=>v==null?'—':'$'+v.toFixed(2)},
      grid:{left:56,right:16,top:16,bottom:26},
      xAxis:{type:'category',data:D.excess.dates,boundaryGap:false,...AXIS,splitLine:{show:false}},
      yAxis:{type:'value',scale:true,...AXIS},
      series:[{type:'line',data:D.px[tk],showSymbol:false,cursor:'default',
        lineStyle:{width:1.8,color:hex},itemStyle:{color:hex},
        areaStyle:{color:hex,opacity:.08}}]
    },true);
    mChart.resize();
  });
}
function closeModal(){
  const wasOpen=modal.classList.contains('open');
  ovl.classList.remove('open'); modal.classList.remove('open');
  document.body.style.overflow='';
  if(wasOpen) syncRoute(null);
}
ovl.onclick=closeModal;

/* ---------- 个股 / ETF 详情弹层 ---------- */
/* 指标格子: items = [[label, valueHtml, wide?]] */
function stats(items){
  const cells=items.filter(x=>x[1]!=null);
  if(!cells.length) return '<div class="nod">暂无数据</div>';
  return `<div class="stats">${cells.map(([l,v,w])=>
    `<div class="stat${w?' wide':''}"><div class="sl">${l}</div><div class="sv">${v}</div></div>`).join('')}</div>`;
}

function openQuote(t){
  window.top.location.href = '/work/sector-rotation/' + t;
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
});

document.getElementById('foot').innerHTML =
  `数据源: YAHOO FINANCE · 板块代理为 SPDR 行业 ETF · RRG 为周频标准化指标，以 100 为中心，轨迹通常顺时针旋转: 改善 → 领先 → 转弱 → 落后
   <span class="footer-cmd"><br/>更新数据: <code>cd scripts/sector-rotation && .venv/bin/python fetch_data.py</code></span> · 页面生成于 ${D.generated}`;

/* ---------- 路由: ?sector=XLK 直达板块详情 ---------- */
(function(){
  const tk=(new URLSearchParams(location.search).get('sector')||'').toUpperCase();
  if(tk && D.sectors.some(s=>s.ticker===tk)) openSector(tk);
})();
</script>
