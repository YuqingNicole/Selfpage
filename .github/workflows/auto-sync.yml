name: Auto Sync with Claude

on:
  schedule:
    # 每天 11:00 Beijing Time (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  auto-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Git
        run: |
          git config user.name "Unicorn-Nicole-AI"
          git config user.email "yuqingchen02@gmail.com"
      
      - name: Create sync branch
        run: |
          git checkout -b auto-sync-$(date +%Y%m%d) || git checkout auto-sync-$(date +%Y%m%d)
      
      - name: Placeholder - Sync Logic Here
        run: |
          echo "Auto sync triggered at $(date)" >> sync-log.txt
      
      - name: Commit changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto sync from Claude - $(date)"
            git push origin auto-sync-$(date +%Y%m%d)
          fi
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: auto sync - $(date)'
          title: 'Auto Sync: $(date)'
          body: 'Automated sync from Claude Code'
          branch: auto-sync-$(date +%Y%m%d)
